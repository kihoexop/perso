<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Familial David & May-li</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Version COMPAT - Indispensable pour les mobiles et fichiers locaux) -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        // ==========================================
        // CONFIGURATION FIREBASE STRICTE
        // ==========================================
        const mySecretConfig = {
            apiKey: "AIzaSyBQx_K8vU02ruKsTCoqmq0ZxmJyQc_qsJ0",
            authDomain: "budget-david-mayli.firebaseapp.com",
            projectId: "budget-david-mayli",
            storageBucket: "budget-david-mayli.firebasestorage.app",
            messagingSenderId: "198614643477",
            appId: "1:198614643477:web:8e20719f4bd108dc59af1c",
            measurementId: "G-XD8Q6Z8Q3"
        };

        let config = mySecretConfig;
        let isPreviewEnv = false;
        
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const envConfig = JSON.parse(__firebase_config);
                if (envConfig && envConfig.apiKey) {
                    config = envConfig;
                    isPreviewEnv = true;
                }
            }
        } catch (e) {
            console.warn("Utilisation de la configuration de production");
        }

        const appId = isPreviewEnv ? (typeof __app_id !== 'undefined' ? __app_id : 'budget-familial-v1') : 'budget-familial-v1';

        try {
            firebase.initializeApp(config);
            window.db = firebase.firestore();
            
            // PARAMÈTRE CRITIQUE POUR LES MOBILES
            window.db.settings({ experimentalForceLongPolling: true });

            window.auth = firebase.auth();
            window.appId = appId;
            window.isPreviewEnv = isPreviewEnv;
            
            setTimeout(() => window.dispatchEvent(new Event('firebase-ready')), 100);
        } catch (err) {
            console.error("Firebase Init Error:", err);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const DEFAULT_CATEGORIES = [
            { id: 'loyer', name: 'Loyer / Logement', icon: 'home', color: 'text-slate-600' },
            { id: 'tel', name: 'Téléphone Mobile', icon: 'smartphone', color: 'text-blue-500' },
            { id: 'elec', name: 'Électricité', icon: 'zap', color: 'text-yellow-500' },
            { id: 'gaz', name: 'Gaz (chauffage)', icon: 'flame', color: 'text-orange-500' },
            { id: 'eau', name: 'Eau', icon: 'droplets', color: 'text-cyan-500' },
            { id: 'internet', name: 'Internet (fibre/ADSL)', icon: 'wifi', color: 'text-indigo-500' },
            { id: 'supermarche', name: 'Supermarché (courses)', icon: 'shopping-cart', color: 'text-emerald-500' },
            { id: 'carburant', name: 'Carburant (essence/diesel)', icon: 'fuel', color: 'text-slate-600' },
            { id: 'sante', name: 'Mutuelle / Santé', icon: 'heart-pulse', color: 'text-rose-500' },
            { id: 'resto', name: 'Restaurants / Sorties', icon: 'utensils', color: 'text-orange-600' },
            { id: 'imprevus', name: 'Urgences / imprévus', icon: 'alert-triangle', color: 'text-red-600' },
            { id: 'autre', name: 'Autre', icon: 'plus-circle', color: 'text-emerald-500' }
        ];

        const COLOR_OPTIONS = [
            { text: 'text-slate-600', bg: 'bg-slate-600' },
            { text: 'text-blue-500', bg: 'bg-blue-500' },
            { text: 'text-emerald-500', bg: 'bg-emerald-500' },
            { text: 'text-rose-500', bg: 'bg-rose-500' },
            { text: 'text-amber-500', bg: 'bg-amber-500' },
            { text: 'text-purple-500', bg: 'bg-purple-500' }
        ];

        const COLOR_MAP = {
            'text-blue-500': '#3b82f6',
            'text-yellow-500': '#eab308',
            'text-cyan-500': '#06b6d4',
            'text-orange-500': '#f97316',
            'text-indigo-500': '#6366f1',
            'text-rose-500': '#f43f5e',
            'text-slate-600': '#475569',
            'text-emerald-500': '#10b981',
        };

        function App() {
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [status, setStatus] = useState('loading');
            const [errorDetails, setErrorDetails] = useState('');
            const [isBlockedByMobile, setIsBlockedByMobile] = useState(false);

            const [newExpense, setNewExpense] = useState({ category: 'tel', label: '', amount: '', date: new Date().toISOString().split('T')[0], isRecurring: false });
            const [newIncome, setNewIncome] = useState({ source: 'David', amount: '', date: new Date().toISOString().split('T')[0] });

            const [showCatManager, setShowCatManager] = useState(false);
            const [newCatName, setNewCatName] = useState('');
            const [newCatColor, setNewCatColor] = useState(COLOR_OPTIONS[2]);

            // Rafraîchissement des icônes
            const triggerIcons = () => {
                setTimeout(() => window.lucide && window.lucide.createIcons(), 50);
            };

            // Authentification
            useEffect(() => {
                let isMounted = true;
                const initAuth = async () => {
                    if (window.auth) {
                        try {
                            if (window.isPreviewEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.auth.signInWithCustomToken(__initial_auth_token);
                            } else {
                                await window.auth.signInAnonymously();
                            }
                        } catch (err) {
                            console.warn("Auth bloquée localement, passage forcé.", err);
                        } 
                        
                        window.auth.onAuthStateChanged((u) => {
                            if (isMounted) {
                                setStatus('ready');
                                triggerIcons();
                            }
                        });
                    }
                };

                const failsafe = setTimeout(() => {
                    if (isMounted && status === 'loading') {
                        setStatus('ready');
                        triggerIcons();
                    }
                }, 3000);

                const checkMobileBlock = setTimeout(() => {
                    const isLocal = window.location.protocol === 'file:';
                    const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
                    if (isLocal && isMobile && status === 'loading') {
                        setIsBlockedByMobile(true);
                    }
                }, 4000);

                window.addEventListener('firebase-ready', initAuth);
                if (window.auth) initAuth();

                return () => {
                    isMounted = false;
                    window.removeEventListener('firebase-ready', initAuth);
                    clearTimeout(failsafe);
                    clearTimeout(checkMobileBlock);
                };
            }, [status]);

            // Chargement des données Firestore
            useEffect(() => {
                if (status !== 'ready') return;
                
                const handleError = (err) => {
                    console.error("Firebase Sync Error:", err);
                    setStatus('error');
                    setErrorDetails(err.message);
                };

                const db = window.db;
                const pathPrefix = `artifacts/${window.appId}/public/data`;

                const unsubInc = db.collection(`${pathPrefix}/incomes`).onSnapshot(s => {
                    setIncomes(s.docs.map(d => ({id: d.id, ...d.data()})));
                    triggerIcons();
                }, handleError);

                const unsubExp = db.collection(`${pathPrefix}/expenses`).onSnapshot(s => {
                    setExpenses(s.docs.map(d => ({id: d.id, ...d.data()})));
                    triggerIcons();
                }, handleError);

                const unsubCat = db.doc(`${pathPrefix}/settings/categories`).onSnapshot(docSnap => {
                    if (docSnap.exists && docSnap.data().list) {
                        setCategories(docSnap.data().list);
                    } else {
                        setCategories(DEFAULT_CATEGORIES);
                    }
                    triggerIcons();
                }, handleError);

                return () => { unsubInc(); unsubExp(); unsubCat(); };
            }, [status]);

            useEffect(() => {
                if (showCatManager) triggerIcons();
            }, [showCatManager, categories]);

            const currentMonthStr = selectedDate.toISOString().substring(0, 7);
            const filteredIncomes = incomes.filter(inc => inc.date.startsWith(currentMonthStr));
            const filteredExpenses = expenses.filter(exp => {
                const isOneTime = !exp.isRecurring && exp.date.startsWith(currentMonthStr);
                const expenseDate = new Date(exp.date);
                const isRecurring = exp.isRecurring && new Date(expenseDate.getFullYear(), expenseDate.getMonth(), 1) <= new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
                return isOneTime || isRecurring;
            });

            const stats = useMemo(() => {
                const startOfCurrentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);

                let pastIncomesTotal = 0;
                incomes.forEach(inc => {
                    const incDate = new Date(inc.date);
                    const incMonthStart = new Date(incDate.getFullYear(), incDate.getMonth(), 1);
                    if (incMonthStart < startOfCurrentMonth) pastIncomesTotal += parseFloat(inc.amount || 0);
                });

                let pastExpensesTotal = 0;
                expenses.forEach(exp => {
                    const expDate = new Date(exp.date);
                    const expMonthStart = new Date(expDate.getFullYear(), expDate.getMonth(), 1);
                    
                    if (!exp.isRecurring) {
                        if (expMonthStart < startOfCurrentMonth) pastExpensesTotal += parseFloat(exp.amount || 0);
                    } else {
                        if (expMonthStart < startOfCurrentMonth) {
                            const monthsDiff = (startOfCurrentMonth.getFullYear() - expMonthStart.getFullYear()) * 12 + (startOfCurrentMonth.getMonth() - expMonthStart.getMonth());
                            if (monthsDiff > 0) pastExpensesTotal += parseFloat(exp.amount || 0) * monthsDiff;
                        }
                    }
                });

                const previousBalance = pastIncomesTotal - pastExpensesTotal;

                const david = filteredIncomes.filter(i => i.source === 'David').reduce((s, i) => s + parseFloat(i.amount || 0), 0);
                const mayli = filteredIncomes.filter(i => i.source === 'May-li').reduce((s, i) => s + parseFloat(i.amount || 0), 0);
                
                let paidExp = 0;
                let plannedExp = 0;
                const today = new Date();
                today.setHours(0,0,0,0);

                filteredExpenses.forEach(exp => {
                    const amount = parseFloat(exp.amount || 0);
                    const expenseDateObj = new Date(exp.date);
                    const displayDate = exp.isRecurring 
                        ? new Date(selectedDate.getFullYear(), selectedDate.getMonth(), expenseDateObj.getDate())
                        : new Date(exp.date);
                    
                    displayDate.setHours(0,0,0,0);

                    if (displayDate <= today) paidExp += amount;
                    else plannedExp += amount;
                });

                const totalExp = paidExp + plannedExp;
                const currentMonthBalance = (david + mayli) - totalExp;
                const balance = previousBalance + currentMonthBalance;

                return { david, mayli, totalRev: david + mayli, totalExp, paidExp, plannedExp, previousBalance, balance };
            }, [incomes, expenses, filteredIncomes, filteredExpenses, selectedDate]);

            // Logique du Graphique Camembert
            const chartData = useMemo(() => {
                const grouped = {};
                let total = 0;
                
                filteredExpenses.forEach(exp => {
                    const catId = exp.category || 'autre';
                    grouped[catId] = (grouped[catId] || 0) + parseFloat(exp.amount || 0);
                    total += parseFloat(exp.amount || 0);
                });

                if (total === 0) return { gradient: '', items: [], total: 0 };

                let currentPercent = 0;
                const items = [];
                const gradientParts = [];

                Object.entries(grouped)
                    .sort((a, b) => b[1] - a[1])
                    .forEach(([catId, amount]) => {
                        const cat = categories.find(c => c.id === catId) || categories[categories.length - 1];
                        const percent = (amount / total) * 100;
                        const color = COLOR_MAP[cat ? cat.color : 'text-slate-600'] || '#94a3b8';

                        gradientParts.push(`${color} ${currentPercent}% ${currentPercent + percent}%`);
                        items.push({
                            name: cat ? cat.name : 'Autre',
                            amount,
                            percent,
                            colorHex: color
                        });
                        
                        currentPercent += percent;
                    });

                return {
                    gradient: `conic-gradient(${gradientParts.join(', ')})`,
                    items,
                    total
                };
            }, [filteredExpenses, categories]);

            // --- Actions ---
            const handleAddCategory = async (e) => {
                e.preventDefault();
                if (!newCatName.trim()) return;
                const newCat = { id: 'cat_' + Date.now(), name: newCatName.trim(), icon: 'tag', color: newCatColor.text };
                const updatedList = [...categories, newCat];
                try {
                    await window.db.doc(`artifacts/${window.appId}/public/data/settings/categories`).set({ list: updatedList });
                    setNewCatName('');
                } catch (err) { console.error(err); }
            };

            const handleDeleteCategory = async (catId) => {
                if (categories.length <= 1) return;
                const updatedList = categories.filter(c => c.id !== catId);
                try {
                    await window.db.doc(`artifacts/${window.appId}/public/data/settings/categories`).set({ list: updatedList });
                    if (newExpense.category === catId) setNewExpense({...newExpense, category: updatedList[0].id});
                } catch (err) { console.error(err); }
            };

            const submitIncome = async (e) => {
                e.preventDefault();
                try {
                    await window.db.collection(`artifacts/${window.appId}/public/data/incomes`).add({
                        ...newIncome, label: 'Revenu', amount: parseFloat(newIncome.amount), date: newIncome.date || new Date().toISOString().split('T')[0]
                    });
                    setNewIncome({...newIncome, amount: ''});
                } catch (err) { console.error(err); }
            };

            const submitExpense = async (e) => {
                e.preventDefault();
                try {
                    await window.db.collection(`artifacts/${window.appId}/public/data/expenses`).add({
                        ...newExpense, amount: parseFloat(newExpense.amount), date: newExpense.date || new Date().toISOString().split('T')[0]
                    });
                    setNewExpense({...newExpense, label: '', amount: '', isRecurring: false});
                } catch (err) { console.error(err); }
            };

            const deleteIncome = async (id) => {
                try { await window.db.doc(`artifacts/${window.appId}/public/data/incomes/${id}`).delete(); } 
                catch (err) { console.error(err); }
            };

            const deleteExpense = async (id) => {
                try { await window.db.doc(`artifacts/${window.appId}/public/data/expenses/${id}`).delete(); } 
                catch (err) { console.error(err); }
            };

            const changeMonth = (offset) => {
                const d = new Date(selectedDate);
                d.setMonth(d.getMonth() + offset);
                setSelectedDate(d);
                triggerIcons();
            };

            if (isBlockedByMobile) return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-900 text-white">
                    <div className="bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl max-w-lg w-full border border-slate-700">
                        <i data-lucide="smartphone-nfc" className="w-16 h-16 text-rose-500 mx-auto mb-6"></i>
                        <h2 className="text-2xl font-black text-white mb-4">Accès Internet Coupé</h2>
                        <p className="text-sm text-slate-300 leading-relaxed mb-6 text-left">
                            Votre téléphone empêche ce fichier local d'accéder à Internet. L'application ne peut donc pas se synchroniser.
                        </p>
                        <div className="bg-rose-500/10 p-4 rounded-2xl border border-rose-500/20 text-left mb-6">
                            <span className="text-xs font-black uppercase text-rose-400 tracking-widest block mb-2">LA SOLUTION :</span>
                            <span className="text-sm text-rose-100">Ce fichier doit être hébergé sur le web. Mettez le fichier en ligne gratuitement sur un site comme <b>tiiny.host</b> ou <b>Netlify Drop</b> depuis votre ordinateur, puis ouvrez le lien généré sur votre téléphone.</span>
                        </div>
                    </div>
                </div>
            );

            if (status === 'error') return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-50">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-rose-100 max-w-lg w-full">
                        <i data-lucide="alert-circle" className="w-12 h-12 text-rose-500 mx-auto mb-4"></i>
                        <h2 className="text-xl font-black text-slate-800 mb-2">Erreur de connexion</h2>
                        <p className="text-sm text-slate-500 leading-relaxed mb-6">
                            Impossible d'accéder à la base de données.
                        </p>
                        <code className="text-xs text-rose-800 break-words block bg-rose-50 p-4 rounded-2xl">{errorDetails}</code>
                    </div>
                </div>
            );

            if (status === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-center">
                    <div className="text-slate-400 font-black uppercase tracking-[0.3em] loading-pulse">Connexion Firebase</div>
                    <div className="mt-4 text-[10px] text-slate-300 font-bold uppercase tracking-widest italic">Base David & May-li</div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-900">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => changeMonth(-1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 transition-colors">
                                 <i data-lucide="chevron-left" className="w-6 h-6"></i>
                            </button>
                            <div className="text-center">
                                <h2 className="text-xl font-black text-indigo-900 capitalize tracking-tight">
                                    {selectedDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}
                                </h2>
                                <div className="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mt-1">Tableau de bord</div>
                            </div>
                            <button onClick={() => changeMonth(1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 transition-colors">
                                <i data-lucide="chevron-right" className="w-6 h-6"></i>
                            </button>
                        </div>

                        {/* Dashboard Cards */}
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                <div className="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-wider">Revenus cumulés</div>
                                <div className="text-3xl font-black text-emerald-600">{stats.totalRev.toFixed(2)} €</div>
                                <div className="mt-3 text-[10px] font-bold text-slate-400 flex gap-3">
                                    <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-indigo-400"></div> David: {stats.david.toFixed(0)}€</span>
                                    <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-rose-400"></div> May-li: {stats.mayli.toFixed(0)}€</span>
                                </div>
                                <i data-lucide="trending-up" className="absolute -right-4 -bottom-4 w-24 h-24 text-emerald-50 opacity-40 group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                <div className="text-[10px] font-black text-slate-300 uppercase mb-4 tracking-wider">Dépenses totales</div>
                                <div className="text-3xl font-black text-rose-600">{stats.totalExp.toFixed(2)} €</div>
                                <div className="text-[10px] text-slate-400 font-bold mt-2 flex gap-2">
                                    <span className="text-rose-600">Payé: {stats.paidExp.toFixed(0)}€</span>
                                    <span className="text-slate-200">|</span>
                                    <span className="text-orange-400">À venir: {stats.plannedExp.toFixed(0)}€</span>
                                </div>
                                <div className="mt-3 text-[10px] font-bold text-slate-400">
                                Dont {(filteredExpenses.filter(e => e.isRecurring).reduce((s,e) => s + parseFloat(e.amount || 0), 0)).toFixed(2)}€ de frais fixes
                                </div>
                                <i data-lucide="trending-down" className="absolute -right-4 -bottom-4 w-24 h-24 text-rose-50 opacity-40 group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div className={`p-6 rounded-[2rem] shadow-sm border relative overflow-hidden group transition-colors ${stats.balance >= 0 ? 'bg-indigo-600 border-indigo-700' : 'bg-rose-900 border-rose-950'} text-white`}>
                                <div className="text-[10px] font-black text-indigo-200/60 uppercase mb-4 tracking-wider">Reste disponible</div>
                                <div className="text-3xl font-black text-white">{stats.balance.toFixed(2)} €</div>
                                <div className="mt-3 text-[10px] font-bold text-indigo-100/60 uppercase tracking-widest flex flex-col gap-1.5">
                                    <span>Report précédent: <strong className="text-white bg-white/20 px-1.5 py-0.5 rounded">{stats.previousBalance >= 0 ? '+' : ''}{stats.previousBalance.toFixed(2)} €</strong></span>
                                </div>
                                <i data-lucide="wallet" className="absolute -right-4 -bottom-4 w-24 h-24 text-white/5 opacity-20 group-hover:scale-110 transition-transform"></i>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Forms */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2 tracking-widest">
                                        <i data-lucide="trending-up" className="w-4 h-4 text-emerald-500"></i> Nouveau Revenu
                                    </h3>
                                    <form onSubmit={submitIncome} className="space-y-4">
                                        <div className="flex p-1 bg-slate-100 rounded-2xl">
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'David'})} className={`flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'David' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>DAVID</button>
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'May-li'})} className={`flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'May-li' ? 'bg-white shadow-sm text-rose-500' : 'text-slate-400 hover:text-slate-600'}`}>MAY-LI</button>
                                        </div>
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" value={newIncome.amount} onChange={e => setNewIncome({...newIncome, amount: e.target.value})} className="flex-1 p-3.5 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-emerald-500" required />
                                            <input type="date" value={newIncome.date} onChange={e => setNewIncome({...newIncome, date: e.target.value})} className="flex-1 p-3.5 bg-slate-50 border-none rounded-2xl text-[10px] font-bold focus:ring-2 focus:ring-emerald-500" required />
                                        </div>
                                        <button type="submit" className="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl text-[10px] tracking-widest hover:bg-emerald-600 shadow-lg shadow-emerald-100 uppercase transition-all">Enregistrer</button>
                                    </form>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2 tracking-widest">
                                        <i data-lucide="trending-down" className="w-4 h-4 text-rose-500"></i> Nouvelle Dépense
                                    </h3>
                                    <form onSubmit={submitExpense} className="space-y-4">
                                        <div className="flex gap-2">
                                            <select className="flex-1 p-3.5 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-600 focus:ring-2 focus:ring-rose-500" value={newExpense.category} onChange={e => setNewExpense({...newExpense, category: e.target.value})}>
                                                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                            <button type="button" onClick={() => setShowCatManager(true)} className="p-3.5 bg-slate-100 hover:bg-slate-200 rounded-2xl text-slate-500 transition-colors" title="Gérer les catégories">
                                                <i data-lucide="settings" className="w-5 h-5"></i>
                                            </button>
                                        </div>

                                        <input type="text" placeholder="Détail" className="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-rose-500" value={newExpense.label} onChange={e => setNewExpense({...newExpense, label: e.target.value})} required />
                                        
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" className="flex-1 p-3.5 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-rose-500" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} required />
                                            <input type="date" className="flex-1 p-3.5 bg-slate-50 border-none rounded-2xl text-[10px] font-bold focus:ring-2 focus:ring-rose-500" value={newExpense.date} onChange={e => setNewExpense({...newExpense, date: e.target.value})} required />
                                        </div>

                                        <label className="flex items-center gap-3 p-4 bg-indigo-50/50 rounded-2xl cursor-pointer group transition-colors hover:bg-indigo-50">
                                            <input type="checkbox" checked={newExpense.isRecurring} onChange={e => setNewExpense({...newExpense, isRecurring: e.target.checked})} className="w-5 h-5 rounded-lg border-none text-indigo-500 shadow-sm focus:ring-0" />
                                            <div className="flex flex-col text-left">
                                                <span className="text-[10px] font-black text-indigo-700 uppercase tracking-wider">Prélèvement Auto</span>
                                                <span className="text-[8px] text-indigo-400 font-bold uppercase italic">Tous les mois</span>
                                            </div>
                                            <i data-lucide="refresh-ccw" className={`ml-auto w-4 h-4 text-indigo-400 transition-transform duration-700 ${newExpense.isRecurring ? 'rotate-180' : ''}`}></i>
                                        </label>
                                        <button type="submit" className="w-full bg-rose-500 text-white font-black py-4 rounded-2xl text-[10px] tracking-widest hover:bg-rose-600 shadow-lg shadow-rose-100 uppercase transition-all">Enregistrer</button>
                                    </form>
                                </div>
                            </div>

                            {/* List Area & Charts */}
                            <div className="lg:col-span-8 space-y-6">
                                
                                {/* Graphique Camembert */}
                                {chartData.total > 0 && (
                                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-8">
                                        <div className="relative shrink-0 w-44 h-44 rounded-full flex items-center justify-center shadow-inner" style={{ background: chartData.gradient }}>
                                            <div className="w-28 h-28 bg-white rounded-full flex flex-col items-center justify-center shadow-sm">
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total</span>
                                                <span className="text-xl font-black text-slate-800">{chartData.total.toFixed(0)}€</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full">
                                            <h3 className="font-black text-[10px] uppercase text-slate-400 tracking-[0.2em] mb-4 flex items-center gap-2">
                                                <i data-lucide="pie-chart" className="w-4 h-4"></i> Répartition des dépenses
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-3">
                                                {chartData.items.map(item => (
                                                    <div key={item.name} className="flex items-center gap-2.5 bg-slate-50 p-2 rounded-xl">
                                                        <div className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: item.colorHex }}></div>
                                                        <div className="flex flex-col flex-1 overflow-hidden">
                                                            <span className="text-[10px] font-bold text-slate-700 truncate">{item.name}</span>
                                                            <span className="text-[9px] font-semibold text-slate-400">{item.amount.toFixed(0)}€</span>
                                                        </div>
                                                        <span className="text-[10px] font-black text-slate-900 pr-1">{item.percent.toFixed(1)}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Liste des Revenus */}
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50">
                                        <h3 className="font-black text-[10px] uppercase text-slate-400 tracking-[0.2em]">Flux de revenus</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredIncomes.length > 0 ? filteredIncomes.sort((a,b) => new Date(a.date).getDate() - new Date(b.date).getDate()).map(inc => (
                                                    <tr key={inc.id} className="hover:bg-slate-50/50 group transition-all">
                                                        <td className="p-5 w-24">
                                                            <span className={`px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest ${inc.source === 'David' ? 'bg-indigo-50 text-indigo-600' : 'bg-rose-50 text-rose-500'}`}>
                                                                {inc.source}
                                                            </span>
                                                        </td>
                                                        <td className="p-5 text-right font-black text-emerald-600">+{parseFloat(inc.amount || 0).toFixed(2)} €</td>
                                                        <td className="p-5 text-right w-24">
                                                            <div className="text-[10px] text-slate-400 font-bold uppercase tracking-tight">{new Date(inc.date).toLocaleDateString('fr-FR')}</div>
                                                        </td>
                                                        <td className="p-5 text-right w-12">
                                                            <button onClick={() => deleteIncome(inc.id)} className="text-slate-200 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition-all p-2 hover:bg-rose-50 rounded-xl">
                                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )) : (
                                                    <tr><td colSpan="4" className="p-8 text-center text-xs font-bold text-slate-300">Aucun revenu pour ce mois.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* Liste des Dépenses */}
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50 flex justify-between items-center">
                                        <h3 className="font-black text-[10px] uppercase text-slate-400 tracking-[0.2em]">Historique des sorties</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredExpenses.length > 0 ? filteredExpenses.sort((a,b) => {
                                                    const getDay = (exp) => exp.isRecurring ? new Date(exp.date).getDate() : new Date(exp.date).getDate();
                                                    return getDay(a) - getDay(b);
                                                }).map(exp => {
                                                    const cat = categories.find(c => c.id === exp.category) || { name: 'Catégorie supprimée', icon: 'tag', color: 'text-slate-400' };
                                                    const expenseDateObj = new Date(exp.date);
                                                    const displayDate = exp.isRecurring 
                                                        ? new Date(selectedDate.getFullYear(), selectedDate.getMonth(), expenseDateObj.getDate())
                                                        : new Date(exp.date);

                                                    const isUpcoming = displayDate > new Date();

                                                    return (
                                                        <tr key={exp.id} className={`hover:bg-slate-50/50 group transition-all ${isUpcoming ? 'opacity-50' : ''} ${exp.isRecurring ? 'bg-slate-50/30' : ''}`}>
                                                            <td className="p-5 w-14">
                                                                <div className={`p-3 rounded-2xl bg-white shadow-sm border ${isUpcoming ? 'border-dashed border-slate-300' : 'border-slate-100'} ${cat.color} inline-block`}>
                                                                    <i data-lucide={cat.icon} className="w-5 h-5"></i>
                                                                </div>
                                                            </td>
                                                            <td className="p-5">
                                                                <div className="flex items-center gap-2">
                                                                    <div className="font-black text-slate-800">{exp.label}</div>
                                                                    {exp.isRecurring && <span className="flex items-center gap-1 bg-indigo-500 text-white text-[8px] font-black px-2 py-0.5 rounded-lg uppercase tracking-tighter"><i data-lucide="refresh-ccw" className="w-2 h-2"></i> Auto</span>}
                                                                    {isUpcoming && <span className="bg-orange-100 text-orange-600 text-[8px] font-black px-2 py-0.5 rounded-lg uppercase tracking-tighter border border-orange-200">À venir</span>}
                                                                </div>
                                                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-tight mt-0.5">
                                                                    Le {displayDate.toLocaleDateString('fr-FR')} • {cat.name}
                                                                </div>
                                                            </td>
                                                            <td className="p-5 text-right font-black text-rose-600">-{parseFloat(exp.amount || 0).toFixed(2)} €</td>
                                                            <td className="p-5 text-right w-12">
                                                                <button onClick={() => deleteExpense(exp.id)} className="text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all p-2 hover:bg-rose-50 rounded-xl">
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                }) : (
                                                    <tr><td colSpan="4" className="p-8 text-center text-xs font-bold text-slate-300">Aucune dépense pour ce mois.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <footer className="mt-12 py-8 border-t border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4 opacity-40 hover:opacity-100 transition-opacity">
                            <div className="flex items-center gap-3 text-[9px] font-black uppercase text-slate-400 tracking-widest">
                                <i data-lucide="cloud" className="w-4 h-4"></i> Mode collaboratif activé
                            </div>
                        </footer>
                    </div>

                    {/* MODAL : Gestionnaire de catégories */}
                    {showCatManager && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-lg text-slate-800">Gérer les catégories</h3>
                                    <button onClick={() => setShowCatManager(false)} className="p-2 bg-slate-100 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-2 mb-6 pr-2">
                                    {categories.map(c => (
                                        <div key={c.id} className="flex justify-between items-center p-3.5 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div className="flex items-center gap-3">
                                                <i data-lucide={c.icon} className={`w-4 h-4 ${c.color}`}></i>
                                                <span className="text-sm font-bold text-slate-700">{c.name}</span>
                                            </div>
                                            <button onClick={() => handleDeleteCategory(c.id)} className="text-slate-300 hover:text-rose-500 transition-colors p-1">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-6 border-t border-slate-100">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Nouvelle catégorie</h4>
                                    <form onSubmit={handleAddCategory} className="space-y-4">
                                        <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="Nom de la catégorie..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-none focus:ring-2 focus:ring-indigo-500" required />
                                        
                                        <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl justify-between">
                                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest pl-1">Couleur :</span>
                                            <div className="flex gap-2">
                                                {COLOR_OPTIONS.map(color => (
                                                    <button type="button" key={color.bg} onClick={() => setNewCatColor(color)} className={`w-6 h-6 rounded-full ${color.bg} ${newCatColor.bg === color.bg ? 'ring-2 ring-offset-2 ring-slate-800' : 'opacity-70'} transition-all`}></button>
                                                ))}
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl text-[10px] tracking-widest hover:bg-slate-900 shadow-lg uppercase transition-all">
                                            Ajouter à la liste
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
