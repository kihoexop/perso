<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Familial David & May-li</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .scanning-active { animation: scan 2s linear infinite; position: absolute; width: 100%; height: 2px; background: #6366f1; top: 0; box-shadow: 0 0 15px #6366f1; z-index: 10; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .dot-pulse { animation: dotPulse 1.5s infinite; }
        @keyframes dotPulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        const mySecretConfig = {
            apiKey: "AIzaSyBQx_K8vU02ruKsTCoqmq0ZxmJyQc_qsJ0",
            authDomain: "budget-david-mayli.firebaseapp.com",
            projectId: "budget-david-mayli",
            storageBucket: "budget-david-mayli.firebasestorage.app",
            messagingSenderId: "198614643477",
            appId: "1:198614643477:web:8e20719f4bd108dc59af1c",
            measurementId: "G-XD8Q6Z8Q3"
        };
        const appId = 'budget-familial-v1';

        try {
            firebase.initializeApp(mySecretConfig);
            window.db = firebase.firestore();
            window.db.settings({ experimentalForceLongPolling: true });
            window.auth = firebase.auth();
            window.appId = appId;
            setTimeout(() => window.dispatchEvent(new Event('firebase-ready')), 100);
        } catch (err) { console.error("Firebase Init Error:", err); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // RESTAURATION DES CATÉGORIES ORIGINALES (12 au total)
        const DEFAULT_CATEGORIES = [
            { id: 'loyer', name: 'Loyer / Logement', icon: 'home', color: 'text-slate-600' },
            { id: 'tel', name: 'Téléphone Mobile', icon: 'smartphone', color: 'text-blue-500' },
            { id: 'elec', name: 'Électricité', icon: 'zap', color: 'text-yellow-500' },
            { id: 'gaz', name: 'Gaz (chauffage)', icon: 'flame', color: 'text-orange-500' },
            { id: 'eau', name: 'Eau', icon: 'droplets', color: 'text-cyan-500' },
            { id: 'internet', name: 'Internet (fibre/ADSL)', icon: 'wifi', color: 'text-indigo-500' },
            { id: 'supermarche', name: 'Supermarché (courses)', icon: 'shopping-cart', color: 'text-emerald-500' },
            { id: 'carburant', name: 'Carburant (essence/diesel)', icon: 'fuel', color: 'text-slate-600' },
            { id: 'sante', name: 'Mutuelle / Santé', icon: 'heart-pulse', color: 'text-rose-500' },
            { id: 'resto', name: 'Restaurants / Sorties', icon: 'utensils', color: 'text-orange-600' },
            { id: 'imprevus', name: 'Urgences / imprévus', icon: 'alert-triangle', color: 'text-red-600' },
            { id: 'autre', name: 'Autre', icon: 'plus-circle', color: 'text-emerald-500' }
        ];

        const COLOR_MAP = {
            'text-blue-500': '#3b82f6', 'text-yellow-500': '#eab308', 'text-cyan-500': '#06b6d4',
            'text-orange-500': '#f97316', 'text-indigo-500': '#6366f1', 'text-rose-500': '#f43f5e',
            'text-slate-600': '#475569', 'text-emerald-500': '#10b981', 'text-red-600': '#dc2626'
        };

        const INITIAL_BALANCE = 977;

        function App() {
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [status, setStatus] = useState('loading');
            const [isScanning, setIsScanning] = useState(false);
            
            // État IA
            const [geminiKey, setGeminiKey] = useState('');
            const [modelId, setModelId] = useState('gemini-1.5-flash');
            const [apiStatus, setApiStatus] = useState('idle');
            const [apiError, setApiError] = useState('');
            const [showAISettings, setShowAISettings] = useState(false);
            
            const fileInputRef = useRef(null);

            const [newExpense, setNewExpense] = useState({ category: 'autre', label: '', amount: '', date: new Date().toISOString().split('T')[0], isRecurring: false });
            const [newIncome, setNewIncome] = useState({ source: 'David', amount: '', date: new Date().toISOString().split('T')[0] });

            const formatCurrency = (val) => isNaN(parseFloat(val)) ? '0.00' : parseFloat(val).toFixed(2);
            const formatInt = (val) => isNaN(parseFloat(val)) ? '0' : parseFloat(val).toFixed(0);
            const triggerIcons = () => setTimeout(() => window.lucide && window.lucide.createIcons(), 100);

            // Initialisation Auth
            useEffect(() => {
                let isMounted = true;
                const init = async () => {
                    if (window.auth) {
                        try { await window.auth.signInAnonymously(); } catch (e) {}
                        window.auth.onAuthStateChanged((u) => { 
                            if (isMounted) { setStatus('ready'); triggerIcons(); } 
                        });
                    }
                };
                init();
                return () => { isMounted = false; };
            }, []);

            // Sync Firestore
            useEffect(() => {
                if (status !== 'ready') return;
                const db = window.db;
                const path = `artifacts/${window.appId}/public/data`;
                
                const unsubInc = db.collection(`${path}/incomes`).onSnapshot(s => { setIncomes(s.docs.map(d => ({id: d.id, ...d.data()}))); triggerIcons(); });
                const unsubExp = db.collection(`${path}/expenses`).onSnapshot(s => { setExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))); triggerIcons(); });
                
                const unsubAI = db.doc(`${path}/settings/ai`).onSnapshot(d => {
                    if (d.exists) {
                        const data = d.data();
                        if (data.geminiKey) {
                            setGeminiKey(data.geminiKey);
                            setApiStatus('connected');
                        }
                        if (data.modelId) setModelId(data.modelId);
                    }
                });

                return () => { unsubInc(); unsubExp(); unsubAI(); };
            }, [status]);

            // CALCULS BUDGET
            const stats = useMemo(() => {
                const curMonth = selectedDate.getMonth();
                const curYear = selectedDate.getFullYear();
                const startM = new Date(curYear, curMonth, 1);
                const today = new Date(); today.setHours(0,0,0,0);
                
                let pastInc = 0, pastExp = 0, incToday = 0, david = 0, mayli = 0, ytdD = 0, ytdM = 0;
                
                incomes.forEach(i => {
                    const d = new Date(i.date);
                    const amt = parseFloat(i.amount || 0);
                    if (d < startM) pastInc += amt;
                    if (d.getFullYear() === curYear && d.getMonth() <= curMonth) {
                        if (i.source === 'David') ytdD += amt; else ytdM += amt;
                    }
                    if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
                        if (i.source === 'David') david += amt; else mayli += amt;
                        if (d <= today) incToday += amt;
                    }
                });

                let paid = 0, planned = 0;
                expenses.forEach(e => {
                    const d = new Date(e.date);
                    const amt = parseFloat(e.amount || 0);
                    if (!e.isRecurring) {
                        if (d < startM) pastExp += amt;
                        else if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
                            if (d <= today) paid += amt; else planned += amt;
                        }
                    } else {
                        if (d < startM) {
                            const diff = (startM.getFullYear() - d.getFullYear()) * 12 + (startM.getMonth() - d.getMonth());
                            if (diff > 0) pastExp += amt * diff;
                        }
                        if (new Date(d.getFullYear(), d.getMonth(), 1) <= startM) {
                            const curExec = new Date(curYear, curMonth, d.getDate());
                            if (curExec <= today) paid += amt; else planned += amt;
                        }
                    }
                });

                const prevBal = INITIAL_BALANCE + pastInc - pastExp;
                const totalMonthRev = david + mayli;
                const balToday = prevBal + incToday - paid;
                const balFinal = prevBal + totalMonthRev - (paid + planned);

                return { david, mayli, totalRev: totalMonthRev, paid, planned, prevBal, balToday, balFinal, ytdD, ytdM };
            }, [incomes, expenses, selectedDate]);

            // LOGIQUE GRAPHIQUE CAMEMBERT
            const chart = useMemo(() => {
                const grouped = {};
                let total = 0;
                const curMonthStr = selectedDate.toISOString().substring(0, 7);
                
                expenses.filter(e => e.date.startsWith(curMonthStr) || e.isRecurring).forEach(e => {
                    const cid = e.category || 'autre';
                    const amt = parseFloat(e.amount || 0);
                    grouped[cid] = (grouped[cid] || 0) + amt;
                    total += amt;
                });

                if (total === 0) return null;

                let current = 0;
                const parts = [];
                const legend = Object.entries(grouped).sort((a,b) => b[1]-a[1]).map(([id, val]) => {
                    const cat = categories.find(c => c.id === id) || categories[categories.length - 1];
                    const p = (val / total) * 100;
                    const col = COLOR_MAP[cat.color] || '#94a3b8';
                    parts.push(`${col} ${current}% ${current+p}%`);
                    current += p;
                    return { ...cat, val, p, col };
                });

                return { gradient: `conic-gradient(${parts.join(',')})`, legend, total };
            }, [expenses, selectedDate, categories]);

            // LOGIQUE IA
            const verifyApiKey = async () => {
                if (!geminiKey.trim()) return;
                setApiStatus('connecting');
                setApiError('');

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey.trim()}`);
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message || "Clé invalide");

                    const available = data.models.map(m => m.name);
                    const priorities = ['models/gemini-2.5-flash', 'models/gemini-2.0-flash', 'models/gemini-1.5-flash'];
                    let best = 'gemini-1.5-flash';
                    for (const p of priorities) {
                        if (available.find(m => m.includes(p))) {
                            best = p.replace('models/', '');
                            break;
                        }
                    }
                    setModelId(best);
                    setApiStatus('connected');
                    await window.db.doc(`artifacts/${window.appId}/public/data/settings/ai`).set({ geminiKey: geminiKey.trim(), modelId: best });
                } catch (err) {
                    setApiStatus('error');
                    setApiError(err.message);
                }
            };

            const handlePhotoCapture = async (e) => {
                const file = e.target.files[0];
                if (!file || apiStatus !== 'connected') return;
                setIsScanning(true);
                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        const prompt = `Analyse ce ticket. Extrais en JSON : {"magasin": string, "total": number, "date": "YYYY-MM-DD", "categorie": "mots-clés"}. Réponds uniquement le JSON.`;
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                        });
                        const data = await res.json();
                        const text = data.candidates[0].content.parts[0].text;
                        const json = JSON.parse(text.match(/\{.*\}/s)[0]);
                        
                        setNewExpense(prev => ({ 
                            ...prev, 
                            label: json.magasin || '', 
                            amount: json.total || '', 
                            date: json.date || prev.date 
                        }));
                        setIsScanning(false);
                        triggerIcons();
                    };
                    reader.readAsDataURL(file);
                } catch (err) { setIsScanning(false); }
            };

            const changeMonth = (offset) => {
                const d = new Date(selectedDate);
                d.setMonth(d.getMonth() + offset);
                setSelectedDate(d);
                triggerIcons();
            };

            if (status === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-50 text-slate-300 font-black uppercase tracking-widest animate-pulse">Chargement...</div>;

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans pb-24 text-slate-900">
                    <div className="max-w-6xl mx-auto">
                        <input type="file" ref={fileInputRef} onChange={handlePhotoCapture} accept="image/*" capture="environment" className="hidden" />

                        {/* Navigation */}
                        <div className="flex items-center justify-between mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => changeMonth(-1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="chevron-left"></i></button>
                            <div className="text-center">
                                <h2 className="text-xl font-black text-indigo-900 capitalize tracking-tight">{selectedDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}</h2>
                                <div className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1 tracking-widest italic opacity-50">David & May-li</div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowAISettings(true)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 relative">
                                    <i data-lucide="settings"></i>
                                    {apiStatus === 'connected' && <div className="absolute top-2 right-2 w-2 h-2 bg-emerald-500 rounded-full border-2 border-white"></div>}
                                    {apiStatus === 'error' && <div className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dot-pulse"></div>}
                                </button>
                                <button onClick={() => changeMonth(1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="chevron-right"></i></button>
                            </div>
                        </div>

                        {/* TOP CARDS */}
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-wider mb-4">Revenus mensuels</div>
                                <div className="text-3xl font-black text-emerald-600">{formatCurrency(stats.totalRev)} €</div>
                                <div className="mt-3 text-[10px] font-bold text-slate-400 flex gap-3">
                                    <span className="flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-indigo-500"></div> D: {formatInt(stats.david)}€</span>
                                    <span className="flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-rose-500"></div> M: {formatInt(stats.mayli)}€</span>
                                </div>
                                <div className="mt-3 pt-2 border-t border-slate-50 text-[8px] font-bold text-slate-300 uppercase tracking-tighter">Année : D: {formatInt(stats.ytdD)}€ • M: {formatInt(stats.ytdM)}€</div>
                                <i data-lucide="trending-up" className="absolute -right-4 -bottom-4 w-24 h-24 text-emerald-50 opacity-30"></i>
                            </div>

                            <div className="bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-wider mb-4">Dépenses totales</div>
                                <div className="text-3xl font-black text-rose-600">{formatCurrency(stats.paid + stats.planned)} €</div>
                                <div className="mt-2 text-[10px] text-slate-400 font-bold flex gap-3">
                                    <span className="text-rose-600 font-black">Payé: {formatInt(stats.paid)}€</span>
                                    <span className="text-slate-200">|</span>
                                    <span className="text-orange-400">À venir: {formatInt(stats.planned)}€</span>
                                </div>
                                <i data-lucide="trending-down" className="absolute -right-4 -bottom-4 w-24 h-24 text-rose-50 opacity-30"></i>
                            </div>

                            <div className={`p-6 rounded-[2.2rem] shadow-lg border-2 relative overflow-hidden group transition-all duration-500 ${stats.balToday >= 0 ? 'bg-indigo-600 border-indigo-500' : 'bg-rose-900 border-rose-800'} text-white`}>
                                <div className="text-[10px] font-black opacity-60 uppercase mb-4 italic tracking-widest">Disponible à date</div>
                                <div className="text-3xl font-black">{formatCurrency(stats.balToday)} €</div>
                                <div className="mt-3 text-[10px] font-bold opacity-80 flex flex-col gap-1 tracking-tight">
                                    <span>Estimation fin de mois : <strong className="bg-white/20 px-1.5 py-0.5 rounded">{formatCurrency(stats.balFinal)} €</strong></span>
                                    <span>Report mois précédents : {formatCurrency(stats.prevBal)} €</span>
                                </div>
                                <i data-lucide="wallet" className="absolute -right-4 -bottom-4 w-24 h-24 text-white opacity-10"></i>
                            </div>
                        </div>

                        {/* GRAPH + FORMS AREA */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            <div className="lg:col-span-4 space-y-6">
                                {/* Form Dépense */}
                                <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                                    {isScanning && <div className="scanning-active"></div>}
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xs font-black uppercase text-slate-400 tracking-[0.2em] flex items-center gap-2"><i data-lucide="minus-circle" className="w-4 h-4 text-rose-500"></i> Dépense</h3>
                                        <button 
                                            onClick={() => apiStatus === 'connected' ? fileInputRef.current.click() : setShowAISettings(true)} 
                                            disabled={isScanning}
                                            className={`p-2.5 rounded-2xl transition-all active:scale-95 ${isScanning ? 'bg-slate-100 text-slate-300' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}
                                        >
                                            <i data-lucide="camera" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        await window.db.collection(`artifacts/${window.appId}/public/data/expenses`).add({...newExpense, amount: parseFloat(newExpense.amount)});
                                        setNewExpense({ category: 'autre', label: '', amount: '', date: new Date().toISOString().split('T')[0], isRecurring: false });
                                    }} className="space-y-4">
                                        <select className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-600" value={newExpense.category} onChange={e => setNewExpense({...newExpense, category: e.target.value})}>
                                            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                        <input type="text" placeholder="Magasin / Détail" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold shadow-inner" value={newExpense.label} onChange={e => setNewExpense({...newExpense, label: e.target.value})} required />
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-sm font-black text-rose-600 shadow-inner" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} required />
                                            <input type="date" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-[10px] font-bold" value={newExpense.date} onChange={e => setNewExpense({...newExpense, date: e.target.value})} required />
                                        </div>
                                        <label className="flex items-center gap-3 p-4 bg-indigo-50/40 rounded-2xl cursor-pointer">
                                            <input type="checkbox" checked={newExpense.isRecurring} onChange={e => setNewExpense({...newExpense, isRecurring: e.target.checked})} className="w-5 h-5 rounded-lg border-none text-indigo-500 shadow-sm" />
                                            <span className="text-[10px] font-black text-indigo-700 uppercase tracking-tighter">Prélèvement Automatique</span>
                                        </label>
                                        <button type="submit" className="w-full bg-rose-500 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-lg shadow-rose-100 hover:bg-rose-600 active:scale-95 transition-all">Enregistrer</button>
                                    </form>
                                </div>

                                {/* Form Revenu */}
                                <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black uppercase text-slate-400 tracking-[0.2em] mb-6 flex items-center gap-2"><i data-lucide="plus-circle" className="w-4 h-4 text-emerald-500"></i> Revenu</h3>
                                    <form onSubmit={async (e) => {
                                        e.preventDefault();
                                        await window.db.collection(`artifacts/${window.appId}/public/data/incomes`).add({...newIncome, amount: parseFloat(newIncome.amount)});
                                        setNewIncome({...newIncome, amount: ''});
                                    }} className="space-y-4">
                                        <div className="flex p-1 bg-slate-100 rounded-2xl">
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'David'})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'David' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}>DAVID</button>
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'May-li'})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'May-li' ? 'bg-white shadow-sm text-rose-500' : 'text-slate-400'}`}>MAY-LI</button>
                                        </div>
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-sm font-black text-emerald-600 shadow-inner" value={newIncome.amount} onChange={e => setNewIncome({...newIncome, amount: e.target.value})} required />
                                            <input type="date" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-[10px] font-bold" value={newIncome.date} onChange={e => setNewIncome({...newIncome, date: e.target.value})} required />
                                        </div>
                                        <button type="submit" className="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-lg shadow-emerald-100 active:scale-95 transition-all">Enregistrer</button>
                                    </form>
                                </div>
                            </div>

                            <div className="lg:col-span-8 space-y-8">
                                {/* GRAPH CAMEMBERT */}
                                {chart && (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-10">
                                        <div className="relative shrink-0 w-48 h-48 rounded-full flex items-center justify-center shadow-inner" style={{ background: chart.gradient }}>
                                            <div className="w-32 h-32 bg-white rounded-full shadow-lg flex flex-col items-center justify-center border-4 border-slate-50">
                                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Total</span>
                                                <span className="text-xl font-black text-slate-800">{formatInt(chart.total)}€</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {chart.legend.map(item => (
                                                <div key={item.id} className="bg-slate-50/50 p-3 rounded-2xl flex items-center justify-between border border-slate-100/50">
                                                    <div className="flex items-center gap-3 overflow-hidden">
                                                        <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{backgroundColor: item.col}}></div>
                                                        <div className="text-[11px] font-bold text-slate-700 truncate uppercase tracking-tighter">{item.name}</div>
                                                    </div>
                                                    <div className="flex flex-col items-end shrink-0">
                                                        <span className="text-[10px] font-black text-slate-900">{formatInt(item.val)}€</span>
                                                        <span className="text-[8px] font-black text-slate-400">{item.p.toFixed(0)}%</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* LISTES DES DÉPENSES */}
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50 font-black text-[10px] uppercase text-rose-500 tracking-[0.2em] bg-rose-50/20">Flux des dépenses</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {expenses.filter(e => e.date.startsWith(selectedDate.toISOString().substring(0, 7)) || e.isRecurring).sort((a,b) => new Date(b.date) - new Date(a.date)).map(exp => {
                                                    const cat = categories.find(c => c.id === exp.category) || categories[categories.length-1];
                                                    const isUp = new Date(exp.date) > new Date();
                                                    return (
                                                        <tr key={exp.id} className={`hover:bg-slate-50/80 transition-all group ${isUp ? 'opacity-40' : ''}`}>
                                                            <td className="p-5 w-12"><div className={`p-3 rounded-2xl bg-white shadow-sm border border-slate-100 ${cat.color}`}><i data-lucide={cat.icon} className="w-5 h-5"></i></div></td>
                                                            <td className="p-5">
                                                                <div className="font-black text-slate-800 flex items-center gap-2 uppercase tracking-tighter">
                                                                    {exp.label}
                                                                    {exp.isRecurring && <span className="text-[8px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full font-black uppercase border border-indigo-100">Auto</span>}
                                                                </div>
                                                                <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 opacity-70 tracking-widest">{cat.name} • {new Date(exp.date).toLocaleDateString('fr-FR')}</div>
                                                            </td>
                                                            <td className="p-5 text-right font-black text-rose-600 text-base">-{formatCurrency(exp.amount)} €</td>
                                                            <td className="p-5 w-12 text-right">
                                                                <button onClick={() => window.db.doc(`artifacts/${window.appId}/public/data/expenses/${exp.id}`).delete()} className="text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* LISTES DES REVENUS */}
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50 font-black text-[10px] uppercase text-emerald-600 tracking-[0.2em] bg-emerald-50/20">Flux des revenus</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {incomes.filter(i => i.date.startsWith(selectedDate.toISOString().substring(0, 7))).sort((a,b) => new Date(b.date) - new Date(a.date)).map(inc => (
                                                    <tr key={inc.id} className="hover:bg-slate-50/80 transition-all group">
                                                        <td className="p-5 w-24">
                                                            <span className={`px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${inc.source === 'David' ? 'bg-indigo-50 text-indigo-600' : 'bg-rose-50 text-rose-500'}`}>{inc.source}</span>
                                                        </td>
                                                        <td className="p-5 text-right font-black text-emerald-600 text-base">+{formatCurrency(inc.amount)} €</td>
                                                        <td className="p-5 text-right text-[10px] text-slate-400 font-black uppercase tracking-widest">{new Date(inc.date).toLocaleDateString('fr-FR', {day: '2-digit', month: 'short'})}</td>
                                                        <td className="p-5 w-12 text-right">
                                                            <button onClick={() => window.db.doc(`artifacts/${window.appId}/public/data/incomes/${inc.id}`).delete()} className="text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL IA */}
                    {showAISettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl relative overflow-hidden">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-black text-xl text-slate-800">Intelligence Artificielle</h3>
                                    <button onClick={() => setShowAISettings(false)} className="p-2 bg-slate-50 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-all active:scale-90"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                <div className="space-y-6">
                                    <div className={`p-6 rounded-[2rem] border transition-all duration-500 ${apiStatus === 'connected' ? 'bg-emerald-50 border-emerald-100' : apiStatus === 'error' ? 'bg-rose-50 border-rose-100' : 'bg-indigo-50 border-indigo-100'}`}>
                                        <div className="flex justify-between items-start mb-4">
                                            <h4 className={`text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-2 ${apiStatus === 'connected' ? 'text-emerald-600' : apiStatus === 'error' ? 'text-rose-600' : 'text-indigo-600'}`}><i data-lucide="key" className="w-4 h-4"></i> Clé API Gemini</h4>
                                            {apiStatus === 'connected' && <div className="w-3 h-3 bg-emerald-500 rounded-full shadow-lg"></div>}
                                            {apiStatus === 'error' && <div className="w-3 h-3 bg-rose-500 rounded-full dot-pulse"></div>}
                                        </div>
                                        <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)} placeholder="Votre clé API..." className="w-full p-4 bg-white border-none rounded-2xl text-sm shadow-sm focus:ring-2 focus:ring-indigo-500 font-mono mb-4" />
                                        <button onClick={() => verifyApiKey()} disabled={apiStatus === 'connecting'} className={`w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all flex flex-col items-center justify-center gap-1 shadow active:scale-95 ${apiStatus === 'connected' ? 'bg-emerald-500 text-white' : apiStatus === 'error' ? 'bg-rose-600 text-white' : 'bg-indigo-600 text-white'}`}>
                                            <div className="flex items-center gap-2">{apiStatus === 'connecting' ? <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i> : <i data-lucide="zap" className="w-3 h-3"></i>}{apiStatus === 'connecting' ? 'Vérification...' : apiStatus === 'connected' ? 'Tester la connexion' : 'Vérifier la clé'}</div>
                                            {apiError && <span className="text-[8px] opacity-80 normal-case font-normal px-2 text-center">{apiError}</span>}
                                        </button>
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="flex items-center justify-center gap-2 p-4 bg-slate-900 text-white rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 transition-all active:scale-95 shadow-lg"><i data-lucide="external-link" className="w-4 h-4"></i> Obtenir ma clé gratuite</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
