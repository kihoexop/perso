<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Familial David & May-li</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        const mySecretConfig = {
            apiKey: "AIzaSyBQx_K8vU02ruKsTCoqmq0ZxmJyQc_qsJ0",
            authDomain: "budget-david-mayli.firebaseapp.com",
            projectId: "budget-david-mayli",
            storageBucket: "budget-david-mayli.firebasestorage.app",
            messagingSenderId: "198614643477",
            appId: "1:198614643477:web:8e20719f4bd108dc59af1c",
            measurementId: "G-XD8Q6Z8Q3"
        };
        const appId = 'budget-familial-v1';

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(mySecretConfig);
            }
            window.db = firebase.firestore();
            window.db.settings({ experimentalForceLongPolling: true });
            window.auth = firebase.auth();
            window.appId = appId;
            setTimeout(() => window.dispatchEvent(new Event('firebase-ready')), 100);
        } catch (err) { console.error("Firebase Init Error:", err); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_CATEGORIES = [
            { id: 'loyer', name: 'Loyer / Logement', icon: 'home', color: 'text-slate-600' },
            { id: 'tel', name: 'Téléphone Mobile', icon: 'smartphone', color: 'text-blue-500' },
            { id: 'elec', name: 'Électricité', icon: 'zap', color: 'text-yellow-500' },
            { id: 'supermarche', name: 'Supermarché', icon: 'shopping-cart', color: 'text-emerald-500' },
            { id: 'carburant', name: 'Carburant', icon: 'fuel', color: 'text-slate-600' },
            { id: 'sante', name: 'Santé', icon: 'heart-pulse', color: 'text-rose-500' },
            { id: 'resto', name: 'Restaurants', icon: 'utensils', color: 'text-orange-600' },
            { id: 'autre', name: 'Autre', icon: 'plus-circle', color: 'text-indigo-500' }
        ];

        const ICON_OPTIONS = ['home', 'smartphone', 'zap', 'flame', 'droplets', 'wifi', 'shopping-cart', 'fuel', 'heart-pulse', 'utensils', 'alert-triangle', 'plus-circle', 'tag', 'credit-card', 'gift', 'coffee', 'train', 'plane', 'dog', 'clapperboard'];
        const COLOR_OPTIONS = [
            { name: 'Gris', text: 'text-slate-600', bg: 'bg-slate-600' },
            { name: 'Bleu', text: 'text-blue-500', bg: 'bg-blue-500' },
            { name: 'Jaune', text: 'text-yellow-500', bg: 'bg-yellow-500' },
            { name: 'Orange', text: 'text-orange-500', bg: 'bg-orange-500' },
            { name: 'Vert', text: 'text-emerald-500', bg: 'bg-emerald-500' },
            { name: 'Rouge', text: 'text-rose-500', bg: 'bg-rose-500' },
            { name: 'Violet', text: 'text-indigo-500', bg: 'bg-indigo-500' },
            { name: 'Pourpre', text: 'text-purple-500', bg: 'bg-purple-500' }
        ];

        const COLOR_MAP = {
            'text-blue-500': '#3b82f6', 'text-yellow-500': '#eab308', 'text-cyan-500': '#06b6d4',
            'text-orange-500': '#f97316', 'text-indigo-500': '#6366f1', 'text-rose-500': '#f43f5e',
            'text-slate-600': '#475569', 'text-emerald-500': '#10b981', 'text-purple-500': '#a855f7'
        };

        const INITIAL_BALANCE = 977;

        function App() {
            const [categories, setCategories] = useState(INITIAL_CATEGORIES);
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [status, setStatus] = useState('loading');
            
            const [showCatManager, setShowCatManager] = useState(false);
            const [newCat, setNewCat] = useState({ name: '', icon: 'tag', color: 'text-indigo-500' });
            
            const [editingItem, setEditingItem] = useState(null);
            const [newExpense, setNewExpense] = useState({ category: 'autre', label: '', amount: '', date: new Date().toISOString().split('T')[0], isRecurring: false });
            const [newIncome, setNewIncome] = useState({ source: 'David', amount: '', date: new Date().toISOString().split('T')[0] });

            const formatCurrency = (val) => isNaN(parseFloat(val)) ? '0.00' : parseFloat(val).toFixed(2);
            const formatInt = (val) => isNaN(parseFloat(val)) ? '0' : parseFloat(val).toFixed(0);
            const triggerIcons = () => setTimeout(() => window.lucide && window.lucide.createIcons(), 100);

            useEffect(() => {
                let isMounted = true;
                const init = async () => {
                    if (window.auth) {
                        try { await window.auth.signInAnonymously(); } catch (e) {}
                        window.auth.onAuthStateChanged((u) => { 
                            if (isMounted) { setStatus('ready'); triggerIcons(); } 
                        });
                    }
                };
                init();
                return () => { isMounted = false; };
            }, []);

            useEffect(() => {
                if (status !== 'ready') return;
                const db = window.db;
                const path = `artifacts/${window.appId}/public/data`;
                
                const unsubInc = db.collection(`${path}/incomes`).onSnapshot(s => { setIncomes(s.docs.map(d => ({id: d.id, ...d.data()}))); triggerIcons(); });
                const unsubExp = db.collection(`${path}/expenses`).onSnapshot(s => { setExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))); triggerIcons(); });
                const unsubCat = db.doc(`${path}/settings/categories`).onSnapshot(d => { 
                    if (d.exists && d.data().list) setCategories(d.data().list); 
                    triggerIcons();
                });

                return () => { unsubInc(); unsubExp(); unsubCat(); };
            }, [status]);

            const stats = useMemo(() => {
                const curMonth = selectedDate.getMonth();
                const curYear = selectedDate.getFullYear();
                const startM = new Date(curYear, curMonth, 1);
                const today = new Date(); today.setHours(0,0,0,0);
                
                let pastInc = 0, pastExp = 0, incToday = 0, david = 0, mayli = 0, ytdD = 0, ytdM = 0;
                incomes.forEach(i => {
                    const d = new Date(i.date);
                    const amt = parseFloat(i.amount || 0);
                    if (d < startM) pastInc += amt;
                    if (d.getFullYear() === curYear && d.getMonth() <= curMonth) {
                        if (i.source === 'David') ytdD += amt; else ytdM += amt;
                    }
                    if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
                        if (i.source === 'David') david += amt; else mayli += amt;
                        if (d <= today) incToday += amt;
                    }
                });

                let paid = 0, planned = 0;
                expenses.forEach(e => {
                    const d = new Date(e.date);
                    const amt = parseFloat(e.amount || 0);
                    if (!e.isRecurring) {
                        if (d < startM) pastExp += amt;
                        else if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
                            if (d <= today) paid += amt; else planned += amt;
                        }
                    } else {
                        if (d < startM) {
                            const diff = (startM.getFullYear() - d.getFullYear()) * 12 + (startM.getMonth() - d.getMonth());
                            if (diff > 0) pastExp += amt * diff;
                        }
                        if (new Date(d.getFullYear(), d.getMonth(), 1) <= startM) {
                            const curExec = new Date(curYear, curMonth, d.getDate());
                            if (curExec <= today) paid += amt; else planned += amt;
                        }
                    }
                });

                const prevBal = INITIAL_BALANCE + pastInc - pastExp;
                const totalMonthRev = david + mayli;
                const balToday = prevBal + incToday - paid;
                const balFinal = prevBal + totalMonthRev - (paid + planned);

                return { david, mayli, totalRev: totalMonthRev, paid, planned, prevBal, balToday, balFinal, ytdD, ytdM };
            }, [incomes, expenses, selectedDate]);

            const chart = useMemo(() => {
                const grouped = {};
                let total = 0;
                const curMonthStr = selectedDate.toISOString().substring(0, 7);
                expenses.filter(e => e.date.startsWith(curMonthStr) || e.isRecurring).forEach(e => {
                    const cid = e.category || 'autre';
                    const amt = parseFloat(e.amount || 0);
                    grouped[cid] = (grouped[cid] || 0) + amt;
                    total += amt;
                });
                if (total === 0) return null;
                let current = 0;
                const parts = [];
                const legend = Object.entries(grouped).sort((a,b) => b[1]-a[1]).map(([id, val]) => {
                    const cat = categories.find(c => c.id === id) || categories[categories.length - 1];
                    const p = (val / total) * 100;
                    const col = COLOR_MAP[cat.color] || '#94a3b8';
                    parts.push(`${col} ${current}% ${current+p}%`);
                    current += p;
                    return { ...cat, val, p, col };
                });
                return { gradient: `conic-gradient(${parts.join(',')})`, legend, total };
            }, [expenses, selectedDate, categories]);

            // --- FONCTIONS ACTIONS ---
            
            const startEditing = (type, item) => {
                setEditingItem({ type, id: item.id, data: { ...item } });
                triggerIcons();
            };

            const saveUpdate = async () => {
                if (!editingItem) return;
                const { type, id, data } = editingItem;
                try {
                    await window.db.doc(`artifacts/${window.appId}/public/data/${type}/${id}`).update({ 
                        ...data, 
                        amount: parseFloat(data.amount) 
                    });
                    setEditingItem(null);
                } catch (e) { console.error("Save error:", e); }
            };

            const deleteItem = async (type, id) => {
                try {
                    await window.db.doc(`artifacts/${window.appId}/public/data/${type}/${id}`).delete();
                } catch (e) { console.error("Delete error:", e); }
            };

            const addCategory = async () => {
                if (!newCat.name.trim()) return;
                try {
                    const list = [...categories, { ...newCat, id: 'cat_' + Date.now() }];
                    await window.db.doc(`artifacts/${window.appId}/public/data/settings/categories`).set({ list });
                    setNewCat({ name: '', icon: 'tag', color: 'text-indigo-500' });
                    triggerIcons();
                } catch (e) { console.error("Add category error:", e); }
            };

            const deleteCategory = async (id) => {
                try {
                    const list = categories.filter(c => c.id !== id);
                    await window.db.doc(`artifacts/${window.appId}/public/data/settings/categories`).set({ list });
                    triggerIcons();
                } catch (e) { console.error("Delete category error:", e); }
            };

            const addExpense = async (e) => {
                e.preventDefault();
                try {
                    await window.db.collection(`artifacts/${window.appId}/public/data/expenses`).add({
                        ...newExpense, 
                        amount: parseFloat(newExpense.amount)
                    });
                    setNewExpense({ ...newExpense, label: '', amount: '' });
                } catch (e) { console.error("Add expense error:", e); }
            };

            const addIncome = async (e) => {
                e.preventDefault();
                try {
                    await window.db.collection(`artifacts/${window.appId}/public/data/incomes`).add({
                        ...newIncome, 
                        amount: parseFloat(newIncome.amount)
                    });
                    setNewIncome({ ...newIncome, amount: '' });
                } catch (e) { console.error("Add income error:", e); }
            };

            const changeMonth = (offset) => {
                const d = new Date(selectedDate);
                d.setMonth(d.getMonth() + offset);
                setSelectedDate(d);
                triggerIcons();
            };

            if (status === 'loading') return <div className="h-screen flex items-center justify-center bg-slate-50 text-slate-300 font-black uppercase tracking-widest animate-pulse">Chargement...</div>;

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans pb-24 text-slate-900">
                    <div className="max-w-6xl mx-auto">
                        {/* Navigation */}
                        <div className="flex items-center justify-between mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                            <button onClick={() => changeMonth(-1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="chevron-left"></i></button>
                            <div className="text-center">
                                <h2 className="text-xl font-black text-indigo-900 capitalize tracking-tight">{selectedDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}</h2>
                                <div className="text-[10px] text-slate-400 font-black uppercase mt-1 italic opacity-50">David & May-li</div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowCatManager(true)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 active:scale-90">
                                    <i data-lucide="settings"></i>
                                </button>
                                <button onClick={() => changeMonth(1)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="chevron-right"></i></button>
                            </div>
                        </div>

                        {/* STATS */}
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                <div className="text-[10px] font-black text-slate-300 uppercase mb-4">Revenus mensuels</div>
                                <div className="text-3xl font-black text-emerald-600">{formatCurrency(stats.totalRev)} €</div>
                                <div className="mt-3 text-[10px] font-bold text-slate-400 flex gap-3">
                                    <span>David: {formatInt(stats.david)}€</span>
                                    <span>May-li: {formatInt(stats.mayli)}€</span>
                                </div>
                                <div className="mt-3 pt-2 border-t border-slate-50 text-[8px] font-bold text-slate-300 uppercase">Année : D: {formatInt(stats.ytdD)}€ • M: {formatInt(stats.ytdM)}€</div>
                                <i data-lucide="trending-up" className="absolute -right-4 -bottom-4 w-24 h-24 text-emerald-50 opacity-30"></i>
                            </div>

                            <div className="bg-white p-6 rounded-[2.2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                                <div className="text-[10px] font-black text-slate-300 uppercase mb-4">Dépenses totales</div>
                                <div className="text-3xl font-black text-rose-600">{formatCurrency(stats.paid + stats.planned)} €</div>
                                <div className="mt-2 text-[10px] text-slate-400 font-bold flex gap-3">
                                    <span className="text-rose-600">Payé: {formatInt(stats.paid)}€</span>
                                    <span className="text-slate-200">|</span>
                                    <span className="text-orange-400">À venir: {formatInt(stats.planned)}€</span>
                                </div>
                                <i data-lucide="trending-down" className="absolute -right-4 -bottom-4 w-24 h-24 text-rose-50 opacity-30"></i>
                            </div>

                            <div className={`p-6 rounded-[2.2rem] shadow-lg border-2 relative overflow-hidden transition-all duration-500 ${stats.balToday >= 0 ? 'bg-indigo-600 border-indigo-500' : 'bg-rose-900 border-rose-800'} text-white`}>
                                <div className="text-[10px] font-black opacity-60 uppercase mb-4 italic">Disponible à date</div>
                                <div className="text-3xl font-black">{formatCurrency(stats.balToday)} €</div>
                                <div className="mt-3 text-[10px] font-bold opacity-80 flex flex-col gap-1 tracking-tight">
                                    <span>Estimation fin de mois : <strong className="bg-white/20 px-1.5 py-0.5 rounded">{formatCurrency(stats.balFinal)} €</strong></span>
                                    <span>Report mois précédents : {formatCurrency(stats.prevBal)} €</span>
                                </div>
                                <i data-lucide="wallet" className="absolute -right-4 -bottom-4 w-24 h-24 text-white opacity-10"></i>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 space-y-6">
                                {/* Form Dépense */}
                                <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2"><i data-lucide="minus-circle" className="w-4 h-4 text-rose-500"></i> Dépense</h3>
                                    <form onSubmit={addExpense} className="space-y-4">
                                        <select className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold text-slate-600" value={newExpense.category} onChange={e => setNewExpense({...newExpense, category: e.target.value})}>
                                            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                        <input type="text" placeholder="Détail" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold" value={newExpense.label} onChange={e => setNewExpense({...newExpense, label: e.target.value})} required />
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-sm font-black text-rose-600 shadow-inner" value={newExpense.amount} onChange={e => setNewExpense({...newExpense, amount: e.target.value})} required />
                                            <input type="date" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-[10px] font-bold shadow-sm" value={newExpense.date} onChange={e => setNewExpense({...newExpense, date: e.target.value})} required />
                                        </div>
                                        <label className="flex items-center gap-3 p-4 bg-indigo-50/40 rounded-2xl cursor-pointer">
                                            <input type="checkbox" checked={newExpense.isRecurring} onChange={e => setNewExpense({...newExpense, isRecurring: e.target.checked})} className="w-5 h-5 rounded-lg border-none text-indigo-500 shadow-sm" />
                                            <span className="text-[10px] font-black text-indigo-700 uppercase tracking-tighter">Prélèvement Automatique</span>
                                        </label>
                                        <button type="submit" className="w-full bg-rose-500 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-lg shadow-rose-100 hover:bg-rose-600 transition-all">Enregistrer</button>
                                    </form>
                                </div>

                                {/* Form Revenu */}
                                <div className="bg-white p-7 rounded-[2rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black uppercase text-slate-400 mb-6 flex items-center gap-2"><i data-lucide="plus-circle" className="w-4 h-4 text-emerald-500"></i> Revenu</h3>
                                    <form onSubmit={addIncome} className="space-y-4">
                                        <div className="flex p-1 bg-slate-100 rounded-2xl">
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'David'})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'David' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}>DAVID</button>
                                            <button type="button" onClick={() => setNewIncome({...newIncome, source: 'May-li'})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${newIncome.source === 'May-li' ? 'bg-white shadow-sm text-rose-500' : 'text-slate-400'}`}>MAY-LI</button>
                                        </div>
                                        <div className="flex gap-3">
                                            <input type="number" step="0.01" placeholder="Montant" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-sm font-black text-emerald-600 shadow-inner" value={newIncome.amount} onChange={e => setNewIncome({...newIncome, amount: e.target.value})} required />
                                            <input type="date" className="flex-1 p-4 bg-slate-50 border-none rounded-2xl text-[10px] font-bold shadow-sm" value={newIncome.date} onChange={e => setNewIncome({...newIncome, date: e.target.value})} required />
                                        </div>
                                        <button type="submit" className="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-lg shadow-emerald-100 active:scale-95 transition-all">Enregistrer</button>
                                    </form>
                                </div>
                            </div>

                            <div className="lg:col-span-8 space-y-8">
                                {/* GRAPH CAMEMBERT */}
                                {chart && (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-10">
                                        <div className="relative shrink-0 w-48 h-48 rounded-full flex items-center justify-center shadow-inner" style={{ background: chart.gradient }}>
                                            <div className="w-32 h-32 bg-white rounded-full shadow-lg flex flex-col items-center justify-center border-4 border-slate-50">
                                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Total</span>
                                                <span className="text-xl font-black text-slate-800">{formatInt(chart.total)}€</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {chart.legend.map(item => (
                                                <div key={item.id} className="bg-slate-50/50 p-3 rounded-2xl flex items-center justify-between border border-slate-100/50">
                                                    <div className="flex items-center gap-3 overflow-hidden">
                                                        <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{backgroundColor: item.col}}></div>
                                                        <div className="text-[11px] font-bold text-slate-700 truncate uppercase tracking-tighter">{item.name}</div>
                                                    </div>
                                                    <div className="flex flex-col items-end shrink-0">
                                                        <span className="text-[10px] font-black text-slate-900">{formatInt(item.val)}€</span>
                                                        <span className="text-[8px] font-black text-slate-400">{item.p.toFixed(0)}%</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* LISTES DES DÉPENSES */}
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50 font-black text-[10px] uppercase text-rose-500 tracking-[0.2em] bg-rose-50/20">Flux des dépenses</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {expenses.filter(e => e.date.startsWith(selectedDate.toISOString().substring(0, 7)) || e.isRecurring).sort((a,b) => new Date(b.date) - new Date(a.date)).map(exp => {
                                                    const cat = categories.find(c => c.id === exp.category) || categories[categories.length-1];
                                                    const isUp = new Date(exp.date) > new Date();
                                                    return (
                                                        <tr key={exp.id} className={`hover:bg-slate-50/80 transition-all group ${isUp ? 'opacity-40' : ''}`}>
                                                            <td className="p-5 w-12"><div className={`p-3 rounded-2xl bg-white shadow-sm border border-slate-100 ${cat.color}`}><i data-lucide={cat.icon} className="w-5 h-5"></i></div></td>
                                                            <td className="p-5">
                                                                <div className="font-black text-slate-800 flex items-center gap-2 uppercase tracking-tighter">
                                                                    {exp.label}
                                                                    {exp.isRecurring && <span className="text-[8px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full font-black uppercase border border-indigo-100">Auto</span>}
                                                                </div>
                                                                <div className="text-[10px] text-slate-400 font-bold uppercase mt-1 opacity-70 tracking-widest">{cat.name} • {new Date(exp.date).toLocaleDateString('fr-FR')}</div>
                                                            </td>
                                                            <td className="p-5 text-right font-black text-rose-600 text-base">-{formatCurrency(exp.amount)} €</td>
                                                            <td className="p-5 w-24 text-right">
                                                                <div className="flex gap-2 justify-end">
                                                                    <button onClick={() => startEditing('expenses', exp)} className="text-slate-300 hover:text-indigo-500 transition-all opacity-0 group-hover:opacity-100 p-2"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                                    <button onClick={() => deleteItem('expenses', exp.id)} className="text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100 p-2"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* LISTES DES REVENUS */}
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-6 border-b border-slate-50 font-black text-[10px] uppercase text-emerald-600 tracking-[0.2em] bg-emerald-50/20">Flux des revenus</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <tbody className="divide-y divide-slate-50">
                                                {incomes.filter(i => i.date.startsWith(selectedDate.toISOString().substring(0, 7))).sort((a,b) => new Date(b.date) - new Date(a.date)).map(inc => (
                                                    <tr key={inc.id} className="hover:bg-slate-50/80 transition-all group">
                                                        <td className="p-5 w-24">
                                                            <span className={`px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${inc.source === 'David' ? 'bg-indigo-50 text-indigo-600' : 'bg-rose-50 text-rose-500'}`}>{inc.source}</span>
                                                        </td>
                                                        <td className="p-5 text-right font-black text-emerald-600 text-base">+{formatCurrency(inc.amount)} €</td>
                                                        <td className="p-5 text-right text-[10px] text-slate-400 font-black uppercase tracking-widest">{new Date(inc.date).toLocaleDateString('fr-FR', {day: '2-digit', month: 'short'})}</td>
                                                        <td className="p-5 w-24 text-right">
                                                            <div className="flex gap-2 justify-end">
                                                                <button onClick={() => startEditing('incomes', inc)} className="text-slate-300 hover:text-indigo-500 transition-all opacity-0 group-hover:opacity-100 p-2"><i data-lucide="edit-2" className="w-4 h-4"></i></button>
                                                                <button onClick={() => deleteItem('incomes', inc.id)} className="text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100 p-2"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL GESTIONNAIRE DE FAMILLES (CATEGORIES) */}
                    {showCatManager && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-lg shadow-2xl relative overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-black text-xl text-slate-800 tracking-tight">Gestion des Familles</h3>
                                    <button onClick={() => setShowCatManager(false)} className="p-2 bg-slate-100 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-all active:scale-90"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>

                                <div className="space-y-6 overflow-y-auto pr-2">
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Ajouter une nouvelle famille</h4>
                                        <div className="space-y-4">
                                            <input type="text" value={newCat.name} onChange={e => setNewCat({...newCat, name: e.target.value})} placeholder="Nom de la famille (ex: Netflix, Sport...)" className="w-full p-4 bg-white border-none rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-indigo-500" />
                                            <div className="grid grid-cols-5 gap-2">
                                                {ICON_OPTIONS.slice(0,10).map(icon => (
                                                    <button key={icon} onClick={() => setNewCat({...newCat, icon})} className={`p-3 rounded-xl transition-all border-2 ${newCat.icon === icon ? 'border-indigo-500 bg-white' : 'border-transparent bg-slate-200/50 opacity-40 hover:opacity-100'}`}><i data-lucide={icon} className="w-4 h-4 mx-auto"></i></button>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {COLOR_OPTIONS.map(color => (
                                                    <button key={color.text} onClick={() => setNewCat({...newCat, color: color.text})} className={`w-8 h-8 rounded-full ${color.bg} transition-all border-4 ${newCat.color === color.text ? 'border-white ring-2 ring-indigo-500 shadow-lg' : 'border-transparent'}`}></button>
                                                ))}
                                            </div>
                                            <button onClick={addCategory} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-lg active:scale-95 transition-all">Créer la famille</button>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-2">Familles existantes</h4>
                                        {categories.map(cat => (
                                            <div key={cat.id} className="flex items-center justify-between p-4 bg-white border border-slate-100 rounded-2xl shadow-sm group">
                                                <div className="flex items-center gap-3">
                                                    <div className={`p-2.5 rounded-xl bg-slate-50 ${cat.color}`}><i data-lucide={cat.icon} className="w-4 h-4"></i></div>
                                                    <span className="font-bold text-sm text-slate-700">{cat.name}</span>
                                                </div>
                                                {cat.id !== 'autre' && (
                                                    <button onClick={() => deleteCategory(cat.id)} className="p-2 text-slate-200 hover:text-rose-500 transition-all active:scale-90"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDITION */}
                    {editingItem && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl animate-in zoom-in-95 duration-200">
                                <div className="flex justify-between items-center mb-8">
                                    <div className="flex flex-col">
                                        <h3 className="font-black text-xl text-slate-800">Modifier l'entrée</h3>
                                    </div>
                                    <button onClick={() => setEditingItem(null)} className="p-2 bg-slate-100 rounded-full hover:bg-rose-100 hover:text-rose-600 transition-all"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                <div className="space-y-5">
                                    {editingItem.type === 'expenses' ? (
                                        <React.Fragment>
                                            <select className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-indigo-500" value={editingItem.data.category} onChange={e => setEditingItem({...editingItem, data: {...editingItem.data, category: e.target.value}})}>
                                                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                            <input type="text" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-bold shadow-sm focus:ring-2 focus:ring-indigo-500" value={editingItem.data.label} onChange={e => setEditingItem({...editingItem, data: {...editingItem.data, label: e.target.value}})} />
                                        </React.Fragment>
                                    ) : (
                                        <div className="flex p-1 bg-slate-100 rounded-2xl">
                                            <button onClick={() => setEditingItem({...editingItem, data: {...editingItem.data, source: 'David'}})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${editingItem.data.source === 'David' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}>DAVID</button>
                                            <button onClick={() => setEditingItem({...editingItem, data: {...editingItem.data, source: 'May-li'}})} className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${editingItem.data.source === 'May-li' ? 'bg-white shadow-sm text-rose-50' : 'text-slate-400'}`}>MAY-LI</button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-sm font-black shadow-sm focus:ring-2 focus:ring-indigo-500" value={editingItem.data.amount} onChange={e => setEditingItem({...editingItem, data: {...editingItem.data, amount: e.target.value}})} />
                                        <input type="date" className="w-full p-4 bg-slate-50 border-none rounded-2xl text-[10px] font-bold shadow-sm focus:ring-2 focus:ring-indigo-500" value={editingItem.data.date} onChange={e => setEditingItem({...editingItem, data: {...editingItem.data, date: e.target.value}})} />
                                    </div>
                                    <div className="pt-4 flex flex-col gap-3">
                                        <button onClick={saveUpdate} className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl text-[11px] tracking-widest uppercase shadow-xl hover:bg-slate-800 active:scale-95 transition-all">Mettre à jour</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
