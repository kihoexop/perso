<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Grand Voyage</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
        /* Style crucial pour forcer Leaflet à prendre la hauteur */
        .leaflet-container { height: 100%; width: 100%; z-index: 10; }
    </style>
</head>
<body class="bg-zinc-100 text-zinc-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // =====================================================================
        // CONFIGURATION
        // =====================================================================
        const FIREBASE_CONFIG = {
          apiKey: "AIzaSyBhjOWnWkt8-NsFVP7I2ElrvleB_PgZ1vI",
          authDomain: "voyage-3e3e7.firebaseapp.com",
          projectId: "voyage-3e3e7",
          storageBucket: "voyage-3e3e7.firebasestorage.app",
          messagingSenderId: "347227768530",
          appId: "1:347227768530:web:e98e3ac3a279f84cc6cf0b",
          measurementId: "G-P5PY64DP0S"
        };

        if (!firebase.apps.length) { firebase.initializeApp(FIREBASE_CONFIG); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        try {
            db.settings({ experimentalForceLongPolling: true, ignoreUndefinedProperties: true });
            db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
        } catch (e) {}

        const tripId = "notre_grand_voyage_2024"; 

        const PERIODS = [
            { id: 'breakfast', label: 'Petit déjeuner', icon: '🥐' },
            { id: 'morning', label: 'Matinée', icon: '🌅' },
            { id: 'lunch', label: 'Déjeuner', icon: '🍽️' },
            { id: 'afternoon', label: 'Après-midi', icon: '☀️' },
            { id: 'dinner', label: 'Dîner', icon: '🍷' },
            { id: 'evening', label: 'Soirée', icon: '🌙' }
        ];

        // =====================================================================
        // UTILITAIRES GLOBAUX (Hors des composants pour éviter la recréation)
        // =====================================================================
        const safeGetLocal = (key) => { try { return localStorage.getItem(key) || ''; } catch(e) { return ''; } };
        const safeSetLocal = (key, value) => { try { localStorage.setItem(key, value); } catch(e) {} };
        const safeRemoveLocal = (key) => { try { localStorage.removeItem(key); } catch(e) {} };
        
        // NOUVEAU : Utilitaires de session (les données s'effacent à la fermeture de l'onglet)
        const safeGetSession = (key) => { try { return sessionStorage.getItem(key) || ''; } catch(e) { return ''; } };
        const safeSetSession = (key, value) => { try { sessionStorage.setItem(key, value); } catch(e) {} };
        const safeRemoveSession = (key) => { try { sessionStorage.removeItem(key); } catch(e) {} };
        
        const SVG_ICONS = {
            map: <g><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></g>,
            "map-pin": <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></g>,
            list: <g><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></g>,
            calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></g>,
            book: <g><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></g>,
            plus: <g><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></g>,
            camera: <g><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></g>,
            settings: <g><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></g>,
            x: <g><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></g>,
            edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></g>,
            trash: <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></g>,
            pin: <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></g>,
            hotel: <g><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path><path d="M9 7h6"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></g>,
            utensils: <g><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></g>,
            sparkles: <g><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></g>,
            navigation: <g><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></g>,
            image: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></g>,
            check: <g><polyline points="20 6 9 17 4 12"></polyline></g>,
            loader: <g><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></g>,
            download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></g>,
            clock: <g><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></g>,
            search: <g><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></g>,
            link: <g><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></g>,
            "chevron-down": <g><polyline points="6 9 12 15 18 9"></polyline></g>,
            "chevron-up": <g><polyline points="18 15 12 9 6 15"></polyline></g>,
            globe: <g><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></g>
        };

        const Icon = React.memo(({ name, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {SVG_ICONS[name]}
            </svg>
        ));

        const detectCountry = (address) => {
            if (!address) return null;
            const addr = address.toLowerCase();
            if (addr.includes('japon') || addr.includes('japan') || addr.includes('tokyo') || addr.includes('osaka') || addr.includes('kyoto')) return 'Japon';
            if (addr.includes('macao') || addr.includes('macau')) return 'Macao';
            if (addr.includes('hong kong') || addr.includes('hong-kong')) return 'Hong Kong';
            if (addr.includes('corée') || addr.includes('korea') || addr.includes('seoul')) return 'Corée du Sud';
            if (addr.includes('chine') || addr.includes('china') || addr.includes('pekin') || addr.includes('shanghai')) return 'Chine';
            if (addr.includes('france') || addr.includes('paris')) return 'France';
            
            const parts = address.split(',');
            if (parts.length > 1) {
                let last = parts[parts.length - 1].replace(/[0-9-]/g, '').trim(); 
                if (last.length >= 3 && last.length <= 25) return last.charAt(0).toUpperCase() + last.slice(1).toLowerCase();
            }
            return null;
        };

        const geocodeAddress = async (address, name, country) => {
            if (!address || address === 'À définir') return { coords: null, fromCache: false };
            
            const cleanName = (name || '').split('(')[0].trim();
            const queryCountry = country || detectCountry(address) || '';
            
            const queries = [
                address,
                cleanName && queryCountry ? `${cleanName}, ${queryCountry}` : null,
                cleanName
            ].filter(q => q && q.length > 2);

            for (const query of queries) {
                const cacheKey = `geocode_v2_${query.trim().toLowerCase()}`;
                const cached = safeGetLocal(cacheKey);
                
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (parsed !== 'not_found') return { coords: parsed, fromCache: true };
                    } catch (e) {}
                    continue; 
                }

                await new Promise(r => setTimeout(r, 2000)); 
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`, { headers: { 'User-Agent': 'MonGrandVoyageApp/1.0' } });
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.length > 0) {
                            const coords = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                            safeSetLocal(cacheKey, JSON.stringify(coords));
                            return { coords, fromCache: false };
                        }
                    }
                } catch (e) {}
                safeSetLocal(cacheKey, JSON.stringify('not_found'));
            }
            return { coords: null, fromCache: false };
        };

        const handleImageUpload = async (e, callback) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            const newPhotos = [];
            for (const file of files) {
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new window.Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            let scaleSize = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                            canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                newPhotos.push(base64);
            }
            callback(newPhotos);
        };

        const getDayColor = (dayIndex) => {
            const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#6366f1', '#84cc16'];
            return colors[dayIndex % colors.length];
        };

        // =====================================================================
        // COMPOSANTS OPTIMISÉS
        // =====================================================================

        // Composant d'Input isolant les frappes clavier (Performance ++)
        const HotelInput = React.memo(({ currentAddress, onSave }) => {
            const [val, setVal] = useState(currentAddress || '');
            useEffect(() => { setVal(currentAddress || ''); }, [currentAddress]);
            
            return (
                <input 
                    type="text" 
                    value={val} 
                    onChange={(e) => setVal(e.target.value)} 
                    onBlur={() => val !== currentAddress && onSave(val)}
                    onKeyDown={(e) => { if (e.key === 'Enter') { e.target.blur(); } }}
                    placeholder="Adresse de l'hôtel (Appuyez sur Entrée pour valider)" 
                    className="w-full px-3 py-2 text-sm bg-white border border-orange-200 rounded-lg outline-none focus:border-orange-400" 
                />
            );
        });

        // Composant isolant la recherche IA (Performance ++)
        const HotelAIBox = React.memo(({ geminiKey, geminiModel, onSelect }) => {
            const [query, setQuery] = useState('');
            const [suggestions, setSuggestions] = useState(null);
            const [loading, setLoading] = useState(false);

            const search = async () => {
                if (!query || !geminiKey) return;
                setLoading(true);
                try {
                    const prompt = `Trouve jusqu'à 3 adresses exactes possibles pour cet hôtel ou hébergement : "${query}". Réponds UNIQUEMENT avec un tableau JSON (sans markdown) contenant des objets avec "name" et "address". Exemple: [{"name": "Hôtel A", "address": "Adresse A"}]`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    setSuggestions(JSON.parse(text.replace(/```json|```/g, '').trim()));
                } catch(e) { }
                setLoading(false);
            };

            if (!geminiModel) return null;

            return (
                <div className="mb-3">
                    <div className="flex gap-2">
                        <input type="text" value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && search()} placeholder="Rechercher avec l'IA (ex: The Venetian...)" className="flex-1 px-3 py-2 text-sm bg-white border border-orange-200 rounded-lg outline-none focus:border-orange-400" />
                        <button onClick={search} disabled={loading || !query} className="bg-orange-500 text-white px-3.5 rounded-lg disabled:opacity-50 flex items-center justify-center hover:bg-orange-600 transition-colors shadow-sm">
                            {loading ? <Icon name="loader" size={16} className="animate-spin" /> : <Icon name="sparkles" size={16} />}
                        </button>
                    </div>
                    {suggestions?.length > 0 && (
                        <div className="mt-2 space-y-2 max-h-48 overflow-y-auto scrollbar-hide animate-in fade-in duration-200">
                            <p className="text-[10px] uppercase font-bold text-orange-400 pl-1">Propositions :</p>
                            {suggestions.map((s, i) => (
                                <div key={i} className="p-3 bg-white border border-orange-100 rounded-lg text-sm shadow-sm">
                                    <p className="font-semibold text-zinc-900">{s.name}</p>
                                    <p className="text-xs text-zinc-500 mb-2 mt-0.5">{s.address}</p>
                                    <button onClick={() => { onSelect(`${s.name}, ${s.address}`); setSuggestions(null); setQuery(''); }} className="w-full bg-orange-50 text-orange-700 font-medium py-1.5 rounded hover:bg-orange-100 transition-colors">Sélectionner</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        });

        // Composant Carte d'Activité
        const ActivityCard = React.memo(({ activity, isPlanner, showTime, showCountry, isExpanded, onToggle, onEdit, onDelete, onAssign, getDayDisplayName, days }) => {
            const borderColor = activity.type === 'restaurant' ? 'border-l-orange-400' : 'border-l-blue-400';
            const displayCountry = activity.country || detectCountry(activity.address);
            
            return (
                <div className={`bg-white border border-zinc-200 rounded-xl shadow-sm overflow-hidden border-l-4 ${borderColor}`}>
                    <div onClick={() => onToggle(activity.id)} className="flex justify-between items-center p-3 cursor-pointer hover:bg-zinc-50 transition-colors">
                        <div className="flex items-center gap-3 overflow-hidden pr-2">
                            {showTime && activity.time && <span className="text-xs font-semibold text-indigo-700 bg-indigo-50 px-2 py-1 rounded-md flex-shrink-0">{activity.time}</span>}
                            <div className="flex flex-col truncate">
                                <h4 className="font-semibold text-zinc-900 truncate">{activity.name}</h4>
                                {showCountry && displayCountry && (
                                    <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mt-0.5 flex items-center gap-1">
                                        <Icon name="globe" size={10} /> {displayCountry}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div className="text-zinc-400 flex-shrink-0">
                            <Icon name={isExpanded ? 'chevron-up' : 'chevron-down'} size={18} />
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="p-3 border-t border-zinc-100 bg-zinc-50/50 animate-in fade-in duration-200">
                            <p className="text-sm text-zinc-500 flex items-start gap-1.5 leading-snug">
                                <Icon name="pin" size={14} className={`mt-0.5 flex-shrink-0 ${activity.type === 'restaurant' ? 'text-orange-500' : 'text-blue-500'}`} />
                                {activity.address}
                            </p>

                            {activity.duration && (
                                <p className="text-xs text-zinc-600 flex items-center gap-1.5 mt-2 font-medium bg-zinc-200/50 inline-flex px-2 py-1 rounded-md">
                                    <Icon name="clock" size={12} /> Durée est. : {activity.duration}
                                </p>
                            )}
                            
                            {activity.url && (
                                <a href={activity.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 mt-2 text-xs font-medium text-indigo-600 hover:text-indigo-800 transition-colors bg-indigo-100/50 px-2 py-1 rounded-md border border-indigo-100">
                                    <Icon name={activity.url.includes('youtu') ? 'youtube' : 'link'} size={12} /> Ouvrir le lien
                                </a>
                            )}
                            
                            {activity.notes && <p className="text-xs text-zinc-600 mt-2.5 italic border-l-2 border-indigo-200 pl-2 leading-relaxed">"{activity.notes}"</p>}
                            
                            {activity.photos?.length > 0 && (
                                <div className="flex gap-2 overflow-x-auto mt-2.5 pb-1 scrollbar-hide">
                                    {activity.photos.map((p, i) => <img key={i} src={p} className="w-16 h-16 rounded-md object-cover flex-shrink-0 border border-zinc-200 shadow-sm" />)}
                                </div>
                            )}

                            <div className="flex flex-wrap gap-2 pt-3 mt-3 border-t border-zinc-200/60">
                                <button onClick={() => onEdit(activity)} className="flex-1 flex justify-center items-center gap-1.5 text-xs font-medium text-zinc-600 bg-white border border-zinc-200 py-2 rounded-lg hover:bg-zinc-100">
                                    <Icon name="edit" size={14} /> Modifier
                                </button>
                                
                                {isPlanner ? (
                                    <>
                                        <button onClick={() => onAssign(activity, '')} className="flex-1 flex justify-center items-center gap-1.5 text-xs font-medium text-zinc-600 bg-white border border-zinc-200 py-2 rounded-lg hover:bg-zinc-100">
                                            <Icon name="list" size={14} /> Retirer
                                        </button>
                                        <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(activity.address)}&travelmode=transit`} target="_blank" className="w-full sm:flex-1 flex items-center justify-center gap-1.5 text-xs font-medium text-white bg-indigo-600 py-2 rounded-lg hover:bg-indigo-700">
                                            <Icon name="navigation" size={14} /> S'y rendre
                                        </a>
                                    </>
                                ) : (
                                    <button onClick={() => onDelete(activity.id)} className="flex-1 flex justify-center items-center gap-1.5 text-xs font-medium text-red-600 bg-red-50 border border-red-100 py-2 rounded-lg hover:bg-red-100">
                                        <Icon name="trash" size={14} /> Supprimer
                                    </button>
                                )}

                                {!isPlanner && (
                                    <select className="w-full bg-white text-zinc-700 text-xs font-medium p-2 rounded-lg border border-zinc-200" value="" onChange={(e) => onAssign(activity, e.target.value)}>
                                        <option value="" disabled>Planifier ce lieu...</option>
                                        {days.map(d => <option key={d.id} value={d.id}>{getDayDisplayName(d.id)}</option>)}
                                    </select>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        });

        // Composant Map Leaflet
        const MapComponent = React.memo(({ activities, countryFilter, days, onAssign, getDayDisplayName }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersLayerRef = useRef(null);
            const [isMapReady, setIsMapReady] = useState(false);

            useEffect(() => {
                if (!mapInstanceRef.current && mapRef.current) {
                    mapInstanceRef.current = L.map(mapRef.current).setView([20, 0], 2);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OSM', maxZoom: 19 }).addTo(mapInstanceRef.current);
                    markersLayerRef.current = L.layerGroup().addTo(mapInstanceRef.current);
                    setIsMapReady(true);
                }

                const resizeTimer = setTimeout(() => {
                    if (mapInstanceRef.current) mapInstanceRef.current.invalidateSize();
                }, 300);
                return () => clearTimeout(resizeTimer);
            }, []);

            useEffect(() => {
                if (isMapReady && mapInstanceRef.current && markersLayerRef.current) {
                    markersLayerRef.current.clearLayers();
                    const bounds = [];
                    
                    const filtered = countryFilter === 'all' ? activities : activities.filter(a => {
                        const actCountry = a.country && a.country.trim() !== '' ? a.country.trim() : 'Autres destinations';
                        return actCountry === countryFilter;
                    });

                    filtered.forEach(act => {
                        if (act.coordinates?.lat && act.coordinates?.lon) {
                            let markerColor = '#18181b'; 
                            let dayLabel = 'Non planifié';
                            
                            if (act.dayId) {
                                const dayIndex = days.findIndex(d => d.id === act.dayId);
                                if (dayIndex !== -1) {
                                    markerColor = getDayColor(dayIndex);
                                    dayLabel = days[dayIndex].label;
                                }
                            }

                            const isResto = act.type === 'restaurant';
                            const borderRadius = isResto ? '4px' : '50%';
                            
                            const customIcon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-color: ${markerColor}; width: 18px; height: 18px; border-radius: ${borderRadius}; border: 2.5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.4);"></div>`,
                                iconSize: [18, 18], iconAnchor: [9, 9]
                            });

                            const popupDiv = document.createElement('div');
                            popupDiv.style.cssText = "text-align: center; padding: 4px; min-width: 140px;";
                            
                            let optionsHtml = `<option value="" disabled ${!act.dayId ? 'selected' : ''}>Planifier ce lieu...</option>`;
                            optionsHtml += `<option value="">-- À faire (Retirer) --</option>`;
                            days.forEach(d => { optionsHtml += `<option value="${d.id}" ${act.dayId === d.id ? 'selected' : ''}>${getDayDisplayName(d.id)}</option>`; });

                            popupDiv.innerHTML = `
                                <b style="font-size: 14px; color: #18181b;">${act.name}</b><br>
                                <span style="font-size: 11px; color: ${markerColor}; font-weight: bold;">${act.dayId ? `📅 ${dayLabel}` : '📋 À faire'}</span><br>
                                <select class="map-day-selector" style="margin-top: 8px; width: 100%; padding: 6px 4px; border-radius: 6px; border: 1px solid #e4e4e7; font-size: 12px; background: #f4f4f5; outline: none; cursor: pointer;">
                                    ${optionsHtml}
                                </select>
                                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.address)}" target="_blank" style="display: inline-block; margin-top: 8px; background: #18181b; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; width: 100%; box-sizing: border-box;">Ouvrir Maps</a>
                            `;

                            const selectEl = popupDiv.querySelector('.map-day-selector');
                            selectEl.addEventListener('change', (e) => {
                                if (onAssign) onAssign(act, e.target.value);
                                if (mapInstanceRef.current) mapInstanceRef.current.closePopup();
                            });

                            const marker = L.marker([act.coordinates.lat, act.coordinates.lon], {icon: customIcon}).bindPopup(popupDiv);
                            markersLayerRef.current.addLayer(marker);
                            bounds.push([act.coordinates.lat, act.coordinates.lon]);
                        }
                    });

                    if (bounds.length > 0) mapInstanceRef.current.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
                    else if (countryFilter === 'all') mapInstanceRef.current.setView([20, 0], 2);
                }
            }, [activities, countryFilter, isMapReady, days, getDayDisplayName, onAssign]);

            return (
                <div className="w-full h-full relative bg-zinc-100 flex items-center justify-center">
                    {!isMapReady && <div className="text-zinc-400 text-sm flex items-center gap-2"><Icon name="loader" className="animate-spin" /> Chargement carte...</div>}
                    <div ref={mapRef} className="absolute inset-0 z-10" />
                </div>
            );
        });

        // Composant Modale des Paramètres (isolée)
        const SettingsModal = React.memo(({ onClose, settings, saveSettings, geminiKey, setGeminiKey, geminiModel, setGeminiModel, handleAutoFill, isUpdatingData, updateMessage, handleExportJson }) => {
            const [tempKeyInput, setTempKeyInput] = useState('');
            const [isKeyValidating, setIsKeyValidating] = useState(false);
            const [keyValidationError, setKeyValidationError] = useState('');

            const validateGeminiKey = async () => {
                if (!tempKeyInput) return;
                setIsKeyValidating(true); setKeyValidationError('');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${tempKeyInput}`);
                    if (!response.ok) throw new Error("Clé API invalide ou refusée.");
                    const data = await response.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
                    if (!validModels.length) throw new Error("Aucun modèle compatible trouvé.");
                    
                    let detectedModel = validModels.find(m => m.name.includes('gemini-1.5-flash'))?.name.replace('models/', '') 
                                     || validModels[0].name.replace('models/', '');

                    setGeminiKey(tempKeyInput); setGeminiModel(detectedModel);
                    
                    // Sauvegarde uniquement pour la session en cours
                    safeSetSession('gemini_api_key', tempKeyInput); 
                    safeSetSession('gemini_model_id', detectedModel);
                    setTempKeyInput('');
                } catch (error) {
                    setKeyValidationError(error.message); setGeminiKey(''); setGeminiModel('');
                    safeRemoveSession('gemini_api_key'); 
                    safeRemoveSession('gemini_model_id');
                }
                setIsKeyValidating(false);
            };

            return (
                <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-50 flex flex-col justify-end animate-in fade-in duration-200">
                    <div className="bg-white rounded-t-2xl shadow-xl w-full max-w-md mx-auto p-5 pb-10 space-y-6 animate-in slide-in-from-bottom-4 duration-200">
                        <div className="flex justify-between items-center"><h3 className="font-semibold text-lg flex items-center gap-2"><Icon name="settings" className="text-indigo-600" /> Paramètres</h3><button onClick={onClose} className="p-2 bg-zinc-100 rounded-full"><Icon name="x" /></button></div>
                        <div><label className="text-xs font-bold text-zinc-600 mb-1 block">Date de début du voyage</label><input type="date" value={settings.startDate} onChange={e => saveSettings({...settings, startDate: e.target.value})} className="w-full p-3 border border-zinc-200 rounded-lg outline-none focus:border-indigo-500" /></div>
                        <div>
                            <label className="text-xs font-bold text-zinc-600 mb-1 flex justify-between"><span>Clé IA Google Gemini</span> <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-600 underline">Obtenir</a></label>
                            <input type="password" value={tempKeyInput} onChange={e => setTempKeyInput(e.target.value)} placeholder={geminiKey ? "••••••••••••••••" : "Collez la clé ici..."} className="w-full p-3 border border-zinc-200 rounded-lg outline-none focus:border-indigo-500" />
                            <button onClick={validateGeminiKey} disabled={isKeyValidating || !tempKeyInput} className="w-full bg-indigo-600 text-white py-3 rounded-lg mt-2 font-medium disabled:opacity-50">{isKeyValidating ? 'Vérification...' : 'Valider la clé'}</button>
                            {geminiModel && <div className="mt-2 p-2 bg-emerald-50 text-emerald-800 text-xs rounded border border-emerald-100 text-center">IA Connectée : {geminiModel}</div>}
                            {keyValidationError && <p className="text-xs text-red-500 mt-1">{keyValidationError}</p>}
                        </div>
                        <div className="pt-4 border-t border-zinc-100 space-y-3">
                            <div>
                                <button onClick={handleAutoFill} disabled={isUpdatingData} className="w-full bg-indigo-50 text-indigo-700 py-3 rounded-lg font-medium flex items-center justify-center gap-2 disabled:opacity-50">{isUpdatingData ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />} Auto-compléter (Durées/Pays)</button>
                                {updateMessage && <p className="text-xs text-center text-indigo-600 mt-2 font-medium">{updateMessage}</p>}
                            </div>
                            <button onClick={handleExportJson} className="w-full bg-white border border-zinc-300 text-zinc-700 font-medium py-3 rounded-lg flex justify-center items-center gap-2"><Icon name="download" size={16} /> Exporter les données (JSON)</button>
                        </div>
                    </div>
                </div>
            );
        });

        // Composant Modale d'Activité / Journal (isolée)
        const ActivityModal = React.memo(({ onClose, initialData, onSave, settings, PERIODS, geminiKey, geminiModel, days }) => {
            const [form, setForm] = useState(initialData);
            const [aiQuery, setAiQuery] = useState('');
            const [aiSuggestion, setAiSuggestion] = useState(null);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isRewriting, setIsRewriting] = useState(false);

            const askGemini = async (prompt) => {
                if(!geminiKey || !geminiModel) { alert("Clé IA manquante (Voir Paramètres)"); return null; }
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) { return null; }
            };

            const handleSearchAi = async (e) => {
                e.preventDefault();
                if (!aiQuery) return;
                setIsAiLoading(true); setAiSuggestion(null);
                const res = await askGemini(`Trouve jusqu'à 3 lieux pour : "${aiQuery}". Réponds UNIQUEMENT en JSON: [{"name": "Nom", "address": "Adresse complète", "country": "Pays", "duration": "1h30"}]. Restaurant = duration min 1h.`);
                if (res) {
                    try { setAiSuggestion(JSON.parse(res.replace(/```json|```/g, '').trim())); } catch(e) {}
                }
                setIsAiLoading(false);
            };

            const handleRewriteNotes = async () => {
                if (!form.notes) return;
                setIsRewriting(true);
                const res = await askGemini(`Agis comme un écrivain de voyage. Réécris ce brouillon de manière poétique, vivante et bien formulée en français. Ne renvoie que le texte. Brouillon : "${form.notes}"`);
                if (res) setForm({...form, notes: res.trim()});
                setIsRewriting(false);
            };

            return (
                <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-40 flex flex-col justify-end animate-in fade-in duration-200">
                    <div className="bg-white rounded-t-2xl w-full max-w-md mx-auto h-[85vh] overflow-y-auto animate-in slide-in-from-bottom-4 duration-200 shadow-xl">
                        <div className="sticky top-0 bg-white border-b border-zinc-100 px-5 py-4 flex justify-between items-center z-10">
                            <h3 className="font-bold text-zinc-900 text-lg">{form.id ? 'Modifier' : 'Nouvelle étape'}</h3>
                            <button onClick={onClose} className="p-2 bg-zinc-100 text-zinc-500 rounded-full hover:text-zinc-900"><Icon name="x"/></button>
                        </div>
                        
                        {!form.id && (
                            <div className="p-5 bg-indigo-50/50 border-b border-indigo-50">
                                <div className="flex gap-2">
                                    <input value={aiQuery} onChange={e => setAiQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSearchAi(e)} placeholder="Rechercher avec l'IA (ex: Musée...)" className="flex-1 p-2.5 rounded-lg border border-indigo-200 outline-none focus:border-indigo-400 text-sm" />
                                    <button onClick={handleSearchAi} className="bg-indigo-600 text-white px-3.5 rounded-lg flex items-center justify-center hover:bg-indigo-700">
                                        {isAiLoading ? <Icon name="loader" size={16} className="animate-spin" /> : <Icon name="sparkles" size={16}/>}
                                    </button>
                                </div>
                                {aiSuggestion && aiSuggestion.map((s, i) => (
                                    <div key={i} className="mt-3 p-3 bg-white border border-indigo-100 rounded-lg shadow-sm">
                                        <b className="text-sm">{s.name}</b><p className="text-xs text-zinc-500">{s.address}</p>
                                        <button onClick={() => { setForm({...form, ...s, duration: s.duration || (form.type === 'restaurant' ? '1h30' : '')}); setAiSuggestion(null); setAiQuery(''); }} className="w-full mt-2 bg-indigo-50 text-indigo-700 font-medium py-1.5 rounded text-sm">Choisir ce lieu</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        <form onSubmit={(e) => { e.preventDefault(); onSave(form); }} className="p-5 space-y-5 pb-10">
                            {/* Photos */}
                            <div>
                                <label className="block text-xs font-semibold text-zinc-500 uppercase mb-2 flex items-center gap-1.5"><Icon name="image" size={14} /> Photos / Inspirations</label>
                                <div className="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                                    {form.photos && form.photos.map((p, idx) => (
                                        <div key={idx} className="relative flex-shrink-0 w-20 h-20 rounded-lg border border-zinc-200 overflow-hidden shadow-sm">
                                            <img src={p} className="w-full h-full object-cover" />
                                            <button type="button" onClick={() => setForm({...form, photos: form.photos.filter((_, i) => i !== idx)})} className="absolute top-1 right-1 bg-zinc-900/70 text-white p-1 rounded-md backdrop-blur-sm"><Icon name="x" size={12} /></button>
                                        </div>
                                    ))}
                                    <label className="flex-shrink-0 w-20 h-20 rounded-lg border-2 border-dashed border-zinc-300 bg-zinc-50 flex flex-col items-center justify-center cursor-pointer text-zinc-400 hover:text-indigo-600 transition-colors">
                                        <Icon name="camera" size={18} className="mb-0.5" /><span className="text-[9px] font-bold uppercase">Prendre</span>
                                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleImageUpload(e, (newPhotos) => setForm({...form, photos: [...(form.photos || []), ...newPhotos]}))} />
                                    </label>
                                    <label className="flex-shrink-0 w-20 h-20 rounded-lg border-2 border-dashed border-zinc-300 bg-zinc-50 flex flex-col items-center justify-center cursor-pointer text-zinc-400 hover:text-indigo-600 transition-colors">
                                        <Icon name="image" size={18} className="mb-0.5" /><span className="text-[9px] font-bold uppercase">Galerie</span>
                                        <input type="file" accept="image/*" multiple className="hidden" onChange={(e) => handleImageUpload(e, (newPhotos) => setForm({...form, photos: [...(form.photos || []), ...newPhotos]}))} />
                                    </label>
                                </div>
                            </div>

                            <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Nom</label><input required value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>
                            <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Adresse</label><input required value={form.address} onChange={e=>setForm({...form, address: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Pays</label><input value={form.country} onChange={e=>setForm({...form, country: e.target.value})} placeholder="Auto si vide" className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>
                                <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Durée</label><input value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} placeholder="Ex: 1h30" className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Planifier</label>
                                    <select value={form.dayId} onChange={e=>setForm({...form, dayId: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm outline-none focus:border-indigo-500">
                                        <option value="">À faire (Idées)</option>
                                        {days.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Type</label>
                                    <select value={form.type} onChange={e=>setForm({...form, type: e.target.value, duration: e.target.value === 'restaurant' && !form.duration ? '1h30' : form.duration})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm outline-none focus:border-indigo-500">
                                        <option value="visite">Lieu / Visite</option><option value="restaurant">Restaurant</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <div className="flex justify-between items-end mb-1">
                                    <label className="text-xs font-semibold text-zinc-500 uppercase flex items-center gap-1.5"><Icon name="list" size={14} /> Notes & Souvenirs</label>
                                    <button type="button" onClick={handleRewriteNotes} disabled={!form.notes || isRewriting} className="text-[10px] font-bold text-teal-700 bg-teal-50 px-2 py-1 rounded hover:bg-teal-100 flex items-center gap-1 transition-colors">
                                        {isRewriting ? <Icon name="loader" size={12} className="animate-spin" /> : <Icon name="sparkles" size={12} />} IA Magique
                                    </button>
                                </div>
                                <textarea value={form.notes} onChange={e=>setForm({...form, notes: e.target.value})} placeholder="Vos souvenirs, plats testés..." className="w-full p-3 border border-zinc-200 rounded-lg text-sm outline-none focus:border-teal-500 h-28" />
                            </div>

                            {form.dayId && (
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Moment</label>
                                        <select value={form.period} onChange={e=>setForm({...form, period: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg bg-white text-sm outline-none focus:border-indigo-500">
                                            {PERIODS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Heure</label><input type="time" value={form.time} onChange={e=>setForm({...form, time: e.target.value})} className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>
                                </div>
                            )}
                            
                            <div><label className="block text-xs font-semibold text-zinc-500 uppercase mb-1">Lien / Site web</label><input type="url" value={form.url} onChange={e=>setForm({...form, url: e.target.value})} placeholder="https://..." className="w-full p-2.5 border border-zinc-200 rounded-lg text-sm outline-none focus:border-indigo-500" /></div>

                            <button type="submit" className="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 shadow-md flex justify-center items-center gap-2 mt-4">
                                <Icon name="check" size={18} /> {form.id ? 'Mettre à jour' : 'Ajouter'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        });

        // =====================================================================
        // APPLICATION PRINCIPALE
        // =====================================================================
        function App() {
            const [user, setUser] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            
            const [activities, setActivities] = useState([]);
            const [settings, setSettings] = useState({ startDate: '', days: [{ id: 'day-1', label: 'Jour 1', hotelAddress: '' }] });
            
            const [activeTab, setActiveTab] = useState('backlog');
            const [activeDayId, setActiveDayId] = useState('day-1');
            const [journalFilter, setJournalFilter] = useState('all');
            const [mapCountryFilter, setMapCountryFilter] = useState('all');
            const [expandedIds, setExpandedIds] = useState(new Set());
            
            // Gestion optimisée des modales
            const [modalState, setModalState] = useState({ isOpen: false, data: null });
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            
            const [geminiKey, setGeminiKey] = useState(safeGetSession('gemini_api_key'));
            const [geminiModel, setGeminiModel] = useState(safeGetSession('gemini_model_id'));

            const [isUpdatingData, setIsUpdatingData] = useState(false);
            const [updateMessage, setUpdateMessage] = useState('');
            
            const isGeocodingRef = useRef(false);

            // INIT FIREBASE
            useEffect(() => {
                auth.signInAnonymously().catch(() => {});
                return auth.onAuthStateChanged((u) => { setUser(u); setIsInitializing(false); });
            }, []);

            // LOAD DATA
            useEffect(() => {
                if (!user) return;
                const unsubSet = db.doc(`trips/${tripId}/settings/main`).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setSettings({ startDate: d.startDate || '', days: d.days?.length ? d.days : [{ id: 'day-1', label: 'Jour 1' }] });
                        if (d.days?.length && !d.days.find(x => x.id === activeDayId)) setActiveDayId(d.days[0].id);
                    }
                });
                const unsubAct = db.collection(`trips/${tripId}/activities`).onSnapshot(snap => {
                    setActivities(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubSet(); unsubAct(); };
            }, [user]);

            // GEOCODING WORKER
            useEffect(() => {
                if (!user || activeTab !== 'map' || isGeocodingRef.current) return;
                const toGeocode = activities.filter(a => !a.coordinates && !a.geocodeFailed && a.address && a.address !== 'À définir');
                if (!toGeocode.length) return;
                
                let isMounted = true;
                isGeocodingRef.current = true;
                
                const runGeocoding = async () => {
                    for (let i = 0; i < toGeocode.length; i++) {
                        if (!isMounted || activeTab !== 'map') break; 
                        const act = toGeocode[i];
                        const { coords } = await geocodeAddress(act.address, act.name, act.country);
                        try {
                            if (coords) await db.doc(`trips/${tripId}/activities/${act.id}`).update({ coordinates: coords, geocodeFailed: false });
                            else await db.doc(`trips/${tripId}/activities/${act.id}`).update({ geocodeFailed: true });
                        } catch(e) {}
                    }
                    isGeocodingRef.current = false;
                };
                runGeocoding();
                return () => { isMounted = false; isGeocodingRef.current = false; };
            }, [activities, user, activeTab]);

            // CALCULS MEMORISÉS (Performance ++)
            const getDayDisplayName = useCallback((dayId) => {
                const index = settings.days.findIndex(d => d.id === dayId);
                if (index === -1) return 'Jour inconnu';
                const fallback = settings.days[index].label;
                if (!settings.startDate) return fallback;
                const date = new Date(settings.startDate);
                if (isNaN(date.getTime())) return fallback;
                date.setDate(date.getDate() + index);
                const strDate = date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
                return strDate.charAt(0).toUpperCase() + strDate.slice(1);
            }, [settings]);

            const { backlogByCountry, sortedCountries } = useMemo(() => {
                const backlog = activities.filter(a => !a.dayId);
                const grouped = backlog.reduce((acc, act) => {
                    let c = act.country?.trim() || detectCountry(act.address) || 'Autres destinations';
                    if (!acc[c]) acc[c] = [];
                    acc[c].push(act);
                    return acc;
                }, {});
                const sorted = Object.keys(grouped).sort((a, b) => a === 'Autres destinations' ? 1 : b === 'Autres destinations' ? -1 : a.localeCompare(b));
                return { backlogByCountry: grouped, sortedCountries: sorted };
            }, [activities]);

            const plannedActivitiesByPeriod = useMemo(() => {
                const grouped = {};
                PERIODS.forEach(p => grouped[p.id] = []);
                activities.filter(a => a.dayId === activeDayId).sort((a, b) => (a.time || '').localeCompare(b.time || '')).forEach(act => {
                    const p = act.period || 'morning';
                    if (grouped[p]) grouped[p].push(act);
                });
                return grouped;
            }, [activities, activeDayId]);

            // NOUVEAU: Activités uniquement pour la journée sélectionnée
            const currentDayActivities = useMemo(() => {
                return activities.filter(a => a.dayId === activeDayId);
            }, [activities, activeDayId]);

            const journalActivities = useMemo(() => {
                return activities.filter(a => a.dayId && (journalFilter === 'all' || a.dayId === journalFilter)).sort((a, b) => {
                    const dA = settings.days.findIndex(d => d.id === a.dayId), dB = settings.days.findIndex(d => d.id === b.dayId);
                    if (dA !== dB) return dA - dB;
                    return (a.time || '').localeCompare(b.time || '');
                });
            }, [activities, journalFilter, settings.days]);

            const failedGeocodeActivities = useMemo(() => {
                return activities.filter(a => a.geocodeFailed && (!mapCountryFilter || mapCountryFilter === 'all' || a.country === mapCountryFilter));
            }, [activities, mapCountryFilter]);

            // ACTIONS
            const toggleExpand = useCallback((id) => setExpandedIds(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; }), []);
            
            const saveSettings = useCallback(async (newSettings) => {
                setSettings(newSettings);
                if (user) {
                    try {
                        await db.doc(`trips/${tripId}/settings/main`).set(newSettings, { merge: true });
                    } catch (e) {
                        console.warn("Échec sauvegarde Firestore", e);
                    }
                }
            }, [user]);

            const deleteActivity = useCallback(async (id) => user && await db.doc(`trips/${tripId}/activities/${id}`).delete(), [user]);
            const assignActivityToDay = useCallback(async (activity, dayId) => user && await db.doc(`trips/${tripId}/activities/${activity.id}`).update({ dayId: dayId || '' }), [user]);
            const updateDayHotel = useCallback((address) => user && db.doc(`trips/${tripId}/settings/main`).set({ ...settings, days: settings.days.map(d => d.id === activeDayId ? { ...d, hotelAddress: address } : d) }, {merge:true}), [user, settings, activeDayId]);
            const handleAddDay = useCallback(() => user && db.doc(`trips/${tripId}/settings/main`).set({ ...settings, days: [...settings.days, { id: `day-${Date.now()}`, label: `Jour ${settings.days.length + 1}`, hotelAddress: '' }] }, {merge:true}), [user, settings]);

            const openActivityModal = useCallback((activity = null) => {
                if (activity) {
                    setModalState({ isOpen: true, data: { ...activity, photos: activity.photos || [] } });
                } else {
                    setModalState({ 
                        isOpen: true, 
                        data: { 
                            id: null, name: '', type: 'visite', address: '', country: '', duration: '', 
                            time: '10:00', period: 'morning', 
                            dayId: activeTab === 'planner' ? activeDayId : '', 
                            url: '', photos: [], notes: '' 
                        } 
                    });
                }
            }, [activeTab, activeDayId]);

            const openSpontaneousJournalModal = useCallback(() => {
                const now = new Date();
                setModalState({ 
                    isOpen: true, 
                    data: { 
                        id: null, name: '', type: 'visite', address: '', country: '', duration: '', 
                        time: `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`, 
                        dayId: settings.days.find(d => d.id === activeDayId)?.id || settings.days[0]?.id || '', 
                        url: '', photos: [], notes: '', period: 'morning' 
                    } 
                });
            }, [settings.days, activeDayId]);

            const saveActivity = useCallback(async (formData) => {
                let finalCountry = formData.country || detectCountry(formData.address) || '';
                const data = { ...formData, country: finalCountry };
                
                if (data.id && modalState.data && modalState.data.address !== formData.address) {
                    data.coordinates = null;
                    data.geocodeFailed = false;
                } else if (!data.id) {
                    data.geocodeFailed = false;
                }

                const { id, ...saveData } = data;
                if (id) await db.doc(`trips/${tripId}/activities/${id}`).update(saveData);
                else await db.collection(`trips/${tripId}/activities`).add(saveData);
                
                setModalState({ isOpen: false, data: null });
            }, [modalState.data]);

            const handleAutoFill = async () => {
                setIsUpdatingData(true);
                const batch = db.batch();
                let count = 0;
                activities.forEach(act => {
                    let upd = {};
                    if (!act.duration) upd.duration = act.type === 'restaurant' ? '1h30' : '2h00';
                    if (!act.country && act.address) { const c = detectCountry(act.address); if (c) upd.country = c; }
                    if (Object.keys(upd).length > 0) { batch.update(db.doc(`trips/${tripId}/activities/${act.id}`), upd); count++; }
                });
                if (count > 0) { await batch.commit(); setUpdateMessage(`${count} lieu(x) mis à jour !`); }
                else setUpdateMessage("Déjà à jour.");
                setIsUpdatingData(false); setTimeout(() => setUpdateMessage(''), 3000);
            };

            const handleExportJson = useCallback(() => {
                const exportData = { version: "1.0", exportDate: new Date().toISOString(), modelId: geminiModel || "non-configure", settings: settings, activities: activities };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "mon_voyage_export.json");
                document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
            }, [geminiModel, settings, activities]);

            if (isInitializing) return <div className="min-h-screen flex items-center justify-center text-sm text-zinc-500">Chargement...</div>;

            return (
                <div className="min-h-screen flex justify-center bg-zinc-100">
                    <div className="w-full max-w-md bg-white min-h-screen relative shadow-sm flex flex-col pb-24">
                        
                        <header className="bg-white border-b border-zinc-200 p-5 sticky top-0 z-20 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-50 rounded-xl"><Icon name="map" size={20} className="text-indigo-600" /></div>
                                <div><h1 className="text-lg font-bold text-zinc-900 tracking-tight">Mon Voyage</h1></div>
                            </div>
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-zinc-400 hover:text-zinc-900 relative">
                                <Icon name="settings" size={22} />
                                <span className={`absolute top-2 right-2 w-2.5 h-2.5 rounded-full border-2 border-white ${geminiModel ? 'bg-emerald-500' : 'bg-red-500'}`}></span>
                            </button>
                        </header>

                        <main className="flex-grow p-4 space-y-6 overflow-x-hidden">
                            {/* CARTE */}
                            {activeTab === 'map' && (
                                <section className="animate-in fade-in duration-200 space-y-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-sm font-semibold text-zinc-800 uppercase tracking-wide">Carte globale</h2>
                                        <select value={mapCountryFilter} onChange={(e) => setMapCountryFilter(e.target.value)} className="bg-white border border-zinc-200 text-zinc-700 text-xs py-1.5 px-3 rounded-lg outline-none shadow-sm">
                                            <option value="all">Tous les pays</option>
                                            {sortedCountries.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="w-full h-[50vh] min-h-[350px] bg-zinc-200 rounded-xl overflow-hidden shadow-inner border border-zinc-300 relative z-0">
                                        <MapComponent activities={activities} countryFilter={mapCountryFilter} days={settings.days} onAssign={assignActivityToDay} getDayDisplayName={getDayDisplayName} />
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <p className="text-[10px] text-zinc-500 text-center">Les points <b className="text-zinc-900">noirs</b> sont "À faire". Les lieux planifiés sont colorés par jour.</p>
                                        {failedGeocodeActivities.length > 0 && (
                                            <div className="bg-orange-50 border border-orange-100 rounded-xl p-3 shadow-sm max-h-48 overflow-y-auto scrollbar-hide">
                                                <p className="text-xs text-orange-700 font-bold mb-2 flex items-center gap-1.5">⚠️ {failedGeocodeActivities.length} lieu(x) introuvable(s) :</p>
                                                <ul className="space-y-1.5">
                                                    {failedGeocodeActivities.map(act => (
                                                        <li key={act.id} className="text-xs text-zinc-800 flex justify-between items-center bg-white p-2 rounded-lg border border-orange-100 shadow-sm">
                                                            <span className="truncate pr-2 font-medium">{act.name}</span>
                                                            <button onClick={() => openActivityModal(act)} className="text-indigo-600 hover:text-indigo-800 flex-shrink-0 bg-indigo-50 px-2 py-1 rounded-md text-[10px] font-bold transition-colors">Modifier</button>
                                                        </li>
                                                    ))}
                                                </ul>
                                                <p className="text-[10px] text-orange-600/80 mt-2 italic leading-tight">Astuce: Essayez de simplifier l'adresse ou supprimez les infos inutiles (ex: 2ème étage).</p>
                                            </div>
                                        )}
                                    </div>
                                </section>
                            )}

                            {/* BACKLOG */}
                            {activeTab === 'backlog' && (
                                <section className="space-y-5 animate-in fade-in duration-200">
                                    <h2 className="text-sm font-semibold text-zinc-800 uppercase tracking-wide">À faire (Idées)</h2>
                                    <div className="space-y-8">
                                        {sortedCountries.map(country => (
                                            <div key={country} className="space-y-3">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <span className="flex items-center justify-center w-8 h-8 bg-indigo-100 text-indigo-700 rounded-full"><Icon name="globe" size={16} /></span>
                                                    <h3 className="text-sm font-bold text-zinc-800 uppercase tracking-wider">{country}</h3>
                                                </div>
                                                <div className="space-y-3 pl-4 border-l-2 border-indigo-100 ml-4">
                                                    {backlogByCountry[country].map(activity => (
                                                        <ActivityCard key={activity.id} activity={activity} isPlanner={false} showTime={false} showCountry={false} isExpanded={expandedIds.has(activity.id)} onToggle={toggleExpand} onEdit={openActivityModal} onDelete={deleteActivity} onAssign={assignActivityToDay} getDayDisplayName={getDayDisplayName} days={settings.days} />
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {/* PLANNER */}
                            {activeTab === 'planner' && (
                                <section className="animate-in fade-in duration-200 space-y-5">
                                    <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide items-center">
                                        {settings.days.map((day, idx) => (
                                            <button key={day.id} onClick={() => setActiveDayId(day.id)} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium border ${activeDayId === day.id ? 'text-white shadow-md border-transparent' : 'bg-white text-zinc-600 border-zinc-200'}`} style={activeDayId === day.id ? { backgroundColor: getDayColor(idx) } : {}}>
                                                {getDayDisplayName(day.id)}
                                            </button>
                                        ))}
                                        <button onClick={handleAddDay} className="flex-shrink-0 p-2 rounded-full bg-indigo-50 text-indigo-600"><Icon name="plus" size={18} /></button>
                                    </div>
                                    <div className="bg-orange-50/50 border border-orange-200/60 rounded-xl p-4">
                                        <label className="text-xs font-semibold text-orange-800 uppercase tracking-wider mb-2 flex items-center gap-1.5"><Icon name="hotel" size={14} className="text-orange-500" /> Hébergement</label>
                                        <HotelAIBox geminiKey={geminiKey} geminiModel={geminiModel} onSelect={updateDayHotel} />
                                        <HotelInput currentAddress={settings.days.find(d => d.id === activeDayId)?.hotelAddress} onSave={updateDayHotel} />
                                    </div>
                                    
                                    {/* NOUVEAU: CARTE DE LA JOURNÉE */}
                                    {currentDayActivities.filter(a => a.coordinates).length > 0 && (
                                        <div className="space-y-2 pt-2">
                                            <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-2 pl-2">
                                                <Icon name="map-pin" size={16} /> Carte de la journée
                                            </h3>
                                            <div className="w-full h-[40vh] min-h-[250px] bg-zinc-200 rounded-xl overflow-hidden shadow-inner border border-zinc-300 relative z-0">
                                                <MapComponent activities={currentDayActivities} countryFilter="all" days={settings.days} onAssign={assignActivityToDay} getDayDisplayName={getDayDisplayName} />
                                            </div>
                                        </div>
                                    )}

                                    <div className="space-y-6 pt-2">
                                        {PERIODS.map(period => plannedActivitiesByPeriod[period.id]?.length > 0 && (
                                            <div key={period.id} className="space-y-3">
                                                <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider flex items-center gap-2 pl-2"><span className="text-base">{period.icon}</span> {period.label}</h3>
                                                <div className="space-y-3 pl-4 border-l border-zinc-200 ml-4">
                                                    {plannedActivitiesByPeriod[period.id].map(activity => (
                                                        <ActivityCard key={activity.id} activity={activity} isPlanner={true} showTime={true} showCountry={true} isExpanded={expandedIds.has(activity.id)} onToggle={toggleExpand} onEdit={openActivityModal} onDelete={deleteActivity} onAssign={assignActivityToDay} getDayDisplayName={getDayDisplayName} days={settings.days} />
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {/* JOURNAL */}
                            {activeTab === 'journal' && (
                                <section className="space-y-5 animate-in fade-in duration-200">
                                    <div className="bg-teal-50/50 p-4 rounded-xl border border-teal-100 flex items-start gap-3">
                                        <div className="text-teal-600 mt-0.5"><Icon name="book" size={24} /></div>
                                        <div><h2 className="font-bold text-teal-900 text-sm">Mon Carnet</h2><p className="text-xs text-teal-700 mt-1 opacity-90">Documentez vos souvenirs.</p></div>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide items-center mb-4">
                                        <button onClick={() => setJournalFilter('all')} className={`px-4 py-2 rounded-full text-sm font-medium border ${journalFilter === 'all' ? 'bg-teal-600 text-white' : 'bg-white text-zinc-600'}`}>Tous</button>
                                        {settings.days.map(day => <button key={day.id} onClick={() => setJournalFilter(day.id)} className={`px-4 py-2 rounded-full text-sm font-medium border ${journalFilter === day.id ? 'bg-teal-600 text-white' : 'bg-white text-zinc-600'}`}>{getDayDisplayName(day.id)}</button>)}
                                    </div>
                                    <div className="space-y-5">
                                        {journalActivities.map(activity => (
                                            <div key={activity.id} className="bg-white border border-zinc-200 rounded-xl overflow-hidden shadow-sm">
                                                {activity.photos?.length > 0 && (
                                                    <div className="relative w-full h-48 flex snap-x overflow-x-auto scrollbar-hide bg-zinc-100">
                                                        {activity.photos.map((p, i) => <div key={i} className="w-full h-full flex-shrink-0 snap-center relative"><img src={p} className="w-full h-full object-cover" /></div>)}
                                                    </div>
                                                )}
                                                <div className="p-4">
                                                    <div className="flex justify-between">
                                                        <div><h3 className="font-semibold text-zinc-900">{activity.name}</h3><p className="text-xs text-zinc-500">{getDayDisplayName(activity.dayId)}</p></div>
                                                        <button onClick={() => openActivityModal(activity)} className="p-2 text-teal-600 bg-teal-50 rounded-full"><Icon name="edit" size={16} /></button>
                                                    </div>
                                                    <p className="text-sm text-zinc-700 mt-3 whitespace-pre-wrap italic border-l-2 border-teal-200 pl-3">{activity.notes || "Ajouter des notes..."}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}
                        </main>

                        <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-zinc-200 flex justify-around p-2 pb-6 z-30">
                            {[{ id: 'backlog', icon: 'list', label: 'À faire' }, { id: 'map', icon: 'map-pin', label: 'Carte' }, { id: 'planner', icon: 'calendar', label: 'Planning' }, { id: 'journal', icon: 'book', label: 'Journal' }].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center p-2 flex-1 relative ${activeTab === tab.id ? 'text-indigo-600' : 'text-zinc-400'}`}>
                                    <Icon name={tab.icon} size={22} className="mb-1.5" /><span className={`text-[10px] uppercase ${activeTab === tab.id ? 'font-bold' : 'font-medium'}`}>{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        <button onClick={() => activeTab === 'journal' ? openSpontaneousJournalModal() : openActivityModal(null)} className={`absolute bottom-24 right-5 w-10 h-10 text-white rounded-full shadow-md z-30 flex items-center justify-center transition-colors ${activeTab === 'journal' ? 'bg-teal-600 hover:bg-teal-700' : 'bg-zinc-900 hover:bg-zinc-800'}`}>
                            <Icon name="plus" size={18} />
                        </button>

                        {/* MODALES OPTIMISÉES */}
                        {isSettingsOpen && (
                            <SettingsModal 
                                onClose={() => setIsSettingsOpen(false)} settings={settings} saveSettings={saveSettings} geminiKey={geminiKey} setGeminiKey={setGeminiKey}
                                geminiModel={geminiModel} setGeminiModel={setGeminiModel} handleAutoFill={handleAutoFill} isUpdatingData={isUpdatingData} updateMessage={updateMessage} handleExportJson={handleExportJson}
                            />
                        )}

                        {modalState.isOpen && (
                            <ActivityModal 
                                isOpen={modalState.isOpen} onClose={() => setModalState({ isOpen: false, data: null })} initialData={modalState.data} onSave={saveActivity} 
                                settings={settings} PERIODS={PERIODS} geminiKey={geminiKey} geminiModel={geminiModel} days={settings.days}
                            />
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
